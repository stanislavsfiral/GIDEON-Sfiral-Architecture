<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GIDEON Engine v7.6</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #00ffcc; }
        .controls-container { position: fixed; top: 20px; right: 20px; z-index: 2001; }
        .control-btn { background: #000; color: #ffcc00; border: 1px solid #ffcc00; width: 35px; height: 35px; cursor: pointer; border-radius: 3px; display: flex; align-items: center; justify-content: center; }
        #gideon-ui { position: fixed; top: 70px; right: 20px; background: rgba(0, 10, 10, 0.95); padding: 15px; border: 1px solid #00ffcc; z-index: 1000; width: 300px; max-height: calc(100vh - 120px); overflow-y: auto; border-radius: 4px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.3); }
        h2 { font-size: 13px; margin: 0 0 15px 0; border-bottom: 1px solid #00ffcc33; padding-bottom: 8px; text-align: center; }
        .cat-group { margin-bottom: 15px; }
        .cat-header { font-size: 10px; color: #ffcc00; margin-bottom: 5px; text-transform: uppercase; border-left: 2px solid #ffcc00; padding-left: 8px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; margin-bottom: 5px; }
        .m-btn { background: rgba(0, 40, 40, 0.4); border: 1px solid #00ffcc33; color: #aaffff; padding: 6px; font-size: 8px; cursor: pointer; border-radius: 2px; transition: 0.2s; text-align: center; }
        .m-btn:hover { border-color: #00ffcc; background: rgba(0, 60, 60, 0.6); }
        .m-btn.wide { grid-column: span 3; font-size: 10px; color: #ffcc00; }
        #stats { font-size: 10px; margin-top: 15px; background: rgba(0, 20, 20, 0.8); padding: 10px; border-radius: 2px; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .stat-value { color: #00ffcc; font-weight: bold; }
        .stat-value.warning { color: #ffaa00; }
        .stat-value.critical { color: #ff5555; }
        #loader { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:2000; color:#00ffcc; }
    </style>
</head>
<body>

    <div id="loader">GIDEON: АНАЛИЗ ПРОИЗВОДИТЕЛЬНОСТИ...</div>

    <div class="controls-container">
        <button class="control-btn" onclick="toggleUI()">≡</button>
    </div>

    <div id="gideon-ui">
        <h2>GIDEON ENGINE v7.6</h2>
        
        <div class="cat-group">
            <div class="cat-header">🧱 БАЗОВЫЕ / ЦЕПИ</div>
            <div class="btn-grid">
                <button class="m-btn" onclick="buildBase(1)">BASE x1</button>
                <button class="m-btn" onclick="buildBase(2)">DIPOLE x2</button>
            </div>
            <div style="display:flex; gap:5px; margin-top:5px;">
                <input type="number" id="chain-count" value="4" style="background:#000; border:1px solid #00ffcc33; color:#ffcc00; width:45px; font-size:10px; padding:4px;">
                <button class="m-btn" style="flex-grow: 1;" onclick="runChain()">BUILD STREAM</button>
            </div>
        </div>

        <div class="cat-group">
            <div class="cat-header">💍 КОЛЬЦА (RINGS)</div>
            <div class="btn-grid">
                <button class="m-btn" onclick="buildFolderGroup('ring3', 3)">x3</button>
                <button class="m-btn" onclick="buildFolderGroup('ring4', 4)">x4</button>
                <button class="m-btn" onclick="buildFolderGroup('ring6', 6)">x6</button>
                <button class="m-btn" onclick="buildFolderGroup('ring8', 8)">x8</button>
            </div>
        </div>

        <div class="cat-group">
            <div class="cat-header">🧸 МАТРЕШКА (NESTING)</div>
            <div class="btn-grid">
                <button class="m-btn wide" onclick="buildMatreshka(2)">МАТРЕШКА (СЛОЙ 1 В 2)</button>
            </div>
        </div>

        <div id="stats">
            <div class="stat-row"><span>ВЕРШИН:</span> <span id="count" class="stat-value">0</span></div>
            <div class="stat-row"><span>ОБЪЕКТОВ:</span> <span id="inst-count" class="stat-value">0</span></div>
            <div class="stat-row"><span>FPS:</span> <span id="fps-counter" class="stat-value">0</span></div>
        </div>
        <button style="width:100%; margin-top:10px; background:transparent; border:1px solid #ffcc00; color:#ffcc00; padding:8px; cursor:pointer; font-size:10px;" onclick="centerView()">CENTER VIEW</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000000);
        camera.position.set(1000, 1000, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        let currentGroup = new THREE.Group();
        scene.add(currentGroup);

        // FPS ПЕРЕМЕННЫЕ
        let fps = 0, lastFpsUpdate = performance.now(), framesThisSecond = 0;

        const ROOT_PATH = 'models/';
        const RINGS_PATH = 'models/static/rings/';

        async function buildMatreshka(layersCount) {
            startLoad();
            let totalPoints = 0;
            for (let i = 1; i <= layersCount; i++) {
                const fullPath = `${RINGS_PATH}matreshka/${i}/part1.npy`;
                const geo = await fetchGeo(fullPath);
                if (geo) {
                    currentGroup.add(new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x00ffcc, size: 2 })));
                    totalPoints += geo.attributes.position.count;
                }
            }
            endLoad(layersCount, totalPoints);
        }

        async function buildFolderGroup(folder, count) {
            startLoad();
            let totalPoints = 0;
            for (let i = 1; i <= count; i++) {
                const fullPath = `${RINGS_PATH}${folder}/part${i}.npy`;
                const geo = await fetchGeo(fullPath);
                if (geo) {
                    currentGroup.add(new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x00ffcc, size: 2 })));
                    totalPoints += geo.attributes.position.count;
                }
            }
            endLoad(count, totalPoints);
        }

        async function buildBase(count) {
            startLoad();
            const geo = await fetchGeo(`${ROOT_PATH}part1.npy`);
            if (geo) {
                for (let i = 0; i < count; i++) {
                    const p = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x00ffcc, size: 2 }));
                    if (i === 1) p.rotation.set(Math.PI, 0, Math.PI);
                    currentGroup.add(p);
                }
                endLoad(count, geo.attributes.position.count * count);
            }
        }

        async function fetchGeo(path) {
            try {
                const res = await fetch(path);
                if(!res.ok) return null;
                const buffer = await res.arrayBuffer();
                return new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(new Float32Array(buffer.slice(128)), 3));
            } catch(e) { return null; }
        }

        function startLoad() {
            scene.remove(currentGroup);
            currentGroup = new THREE.Group();
            scene.add(currentGroup);
            document.getElementById('loader').style.display = 'flex';
        }

        function endLoad(inst, pts) {
            document.getElementById('inst-count').innerText = inst;
            document.getElementById('count').innerText = pts;
            document.getElementById('loader').style.display = 'none';
            setTimeout(centerView, 100);
        }

        function toggleUI() { 
            const ui = document.getElementById('gideon-ui');
            ui.style.display = ui.style.display === 'none' ? 'block' : 'none';
        }

        function centerView() {
            if (!currentGroup || currentGroup.children.length === 0) return;
            let combinedGeometry = new THREE.BufferGeometry();
            let allPositions = [];
            currentGroup.children.forEach(child => {
                if (child.geometry && child.geometry.attributes.position) {
                    const pos = child.geometry.attributes.position.array;
                    for (let i = 0; i < pos.length; i += 3) {
                        const vec = new THREE.Vector3(pos[i], pos[i+1], pos[i+2]);
                        vec.applyMatrix4(child.matrixWorld);
                        allPositions.push(vec.x, vec.y, vec.z);
                    }
                }
            });
            combinedGeometry.setAttribute('position', new THREE.Float32BufferAttribute(allPositions, 3));
            combinedGeometry.computeBoundingSphere();
            const s = combinedGeometry.boundingSphere;
            controls.target.copy(s.center);
            const d = s.radius > 0 ? s.radius * 3.5 : 500;
            camera.position.set(s.center.x, s.center.y, s.center.z + d);
            controls.update();
            combinedGeometry.dispose();
        }

        // ОБНОВЛЕННАЯ ФУНКЦИЯ ANIMATE С FPS МОНИТОРОМ
        function animate() {
            requestAnimationFrame(animate);
            
            // Расчет FPS
            framesThisSecond++;
            const now = performance.now();
            const delta = now - lastFpsUpdate;
            if (delta >= 1000) {
                fps = Math.round((framesThisSecond * 1000) / delta);
                const fpsElement = document.getElementById('fps-counter');
                fpsElement.innerText = fps;
                
                // Цветовая индикация
                fpsElement.className = 'stat-value';
                if (fps < 30) fpsElement.classList.add('critical');
                else if (fps < 50) fpsElement.classList.add('warning');
                
                framesThisSecond = 0;
                lastFpsUpdate = now;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        function runChain() {
            const num = parseInt(document.getElementById('chain-count').value);
            if(num > 0) buildBase(num); // Упрощенно для примера
        }

        buildBase(1);
        animate();
    </script>
</body>
</html>
