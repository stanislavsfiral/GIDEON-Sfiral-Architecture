<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GIDEON Engine v8.4 - Fractal Chain Perfect</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #00ffcc; }
        .controls-container { position: fixed; top: 20px; right: 20px; z-index: 2001; }
        .control-btn { background: #000; color: #ffcc00; border: 1px solid #ffcc00; width: 35px; height: 35px; cursor: pointer; border-radius: 3px; display: flex; align-items: center; justify-content: center; }
        #gideon-ui { position: fixed; top: 70px; right: 20px; background: rgba(0, 10, 10, 0.95); padding: 15px; border: 1px solid #00ffcc; z-index: 1000; width: 300px; max-height: calc(100vh - 120px); overflow-y: auto; border-radius: 4px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.3); }
        h2 { font-size: 13px; margin: 0 0 15px 0; border-bottom: 1px solid #00ffcc; padding-bottom: 8px; text-align: center; }
        .cat-group { margin-bottom: 15px; background: rgba(0,30,30,0.3); padding: 10px; border-radius: 4px; }
        .cat-header { font-size: 10px; color: #ffcc00; margin-bottom: 8px; text-transform: uppercase; border-left: 2px solid #ffcc00; padding-left: 8px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; margin-bottom: 5px; }
        .input-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 10px; }
        input { background: #000; border: 1px solid #00ffcc33; color: #ffcc00; width: 45px; padding: 4px; font-size: 10px; }
        .m-btn { background: rgba(0, 40, 40, 0.4); border: 1px solid #00ffcc33; color: #aaffff; padding: 6px; font-size: 9px; cursor: pointer; border-radius: 2px; text-align: center; }
        .m-btn:hover { border-color: #00ffcc; background: rgba(0, 60, 60, 0.6); }
        .m-btn.action { background: rgba(0, 80, 80, 0.6); border: 1px solid #00ffcc; color: #fff; font-weight: bold; padding: 10px; margin-top: 5px; width: 100%; font-size: 10px; }
        #stats { font-size: 10px; margin-top: 15px; border-top: 1px solid #00ffcc33; padding-top: 10px; }
        #loader { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:2000; color:#00ffcc; }
    </style>
</head>
<body>

    <div id="loader">GIDEON: СБОРКА ФРАКТАЛЬНОЙ ЦЕПИ...</div>

    <div class="controls-container"><button class="control-btn" onclick="toggleUI()">≡</button></div>

    <div id="gideon-ui">
        <h2>GIDEON ENGINE v8.4</h2>
        
        <div class="cat-group">
            <div class="cat-header">🧱 БАЗА / ДИПОЛЬ / ЦЕПЬ</div>
            <div class="btn-grid">
                <button class="m-btn" onclick="buildBase(1)">BASE x1</button>
                <button class="m-btn" onclick="buildBase(2)">DIPOLE x2</button>
            </div>
            <div class="input-row" style="margin-top:5px;">
                <span>ЗВЕНЬЕВ:</span>
                <input type="number" id="simple-chain" value="4" min="1">
                <button class="m-btn" style="width:100px" onclick="runSimpleChain()">BUILD CHAIN</button>
            </div>
        </div>

        <div class="cat-group">
            <div class="cat-header">💍 КОЛЬЦА (RINGS)</div>
            <div class="btn-grid">
                <button class="m-btn" onclick="buildRingFolder('ring3', 3)">RING x3</button>
                <button class="m-btn" onclick="buildRingFolder('ring4', 4)">RING x4</button>
                <button class="m-btn" onclick="buildRingFolder('ring6', 6)">RING x6</button>
                <button class="m-btn" onclick="buildRingFolder('ring8', 8)">RING x8</button>
            </div>
        </div>

        <div class="cat-group">
            <div class="cat-header">🧬 ФРАКТАЛЬНЫЙ СТРИМ (МАТРЕШКИ)</div>
            <div class="input-row"><span>ВЛОЖЕННОСТЬ (L):</span> <input type="number" id="nest-levels" value="2" min="1" max="5"></div>
            <div class="input-row"><span>ЦЕПОЧКА (CH):</span> <input type="number" id="nest-chain" value="1" min="1" max="30"></div>
            <button class="m-btn action" onclick="buildFractalChain()">ПОСТРОИТЬ ЦЕПЬ МАТРЕШЕК</button>
        </div>

        <div id="stats">
            <div class="stat-row"><span>СФИРАЛЕЙ:</span> <span id="inst-count" style="color:#ffcc00">0</span></div>
            <div class="stat-row"><span>ВЕРШИН:</span> <span id="count" style="color:#00ffcc">0</span></div>
        </div>
        <button style="width:100%; margin-top:10px; background:transparent; border:1px solid #ffcc00; color:#ffcc00; padding:5px; cursor:pointer; font-size:9px;" onclick="centerView()">CENTER VIEW</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000000);
        camera.position.set(1500, 1500, 1500);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        let currentGroup = new THREE.Group();
        scene.add(currentGroup);

        const BASE_PATH = 'models/';
        const RINGS_PATH = 'models/static/rings/';
        const STEP_Z_OLD = 372.47; 
        const OFFSET_X = 75;
        const OFFSET_Z = 93.12;

        async function fetchPoints(path) {
            const res = await fetch(path);
            if (!res.ok) return null;
            const buffer = await res.arrayBuffer();
            return new Float32Array(buffer.slice(128));
        }

        function createPoints(data, color, scale = 1, opacity = 1) {
            const geo = new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(data, 3));
            const mat = new THREE.PointsMaterial({ color: color, size: 2 * scale, transparent: true, opacity: opacity });
            return new THREE.Points(geo, mat);
        }

        async function buildBase(count) {
            startLoad();
            const data = await fetchPoints(`${BASE_PATH}part1.npy`);
            if (data) {
                for (let i = 0; i < count; i++) {
                    const p = createPoints(data, 0x00ffcc);
                    if (i === 1) p.rotation.set(Math.PI, 0, Math.PI);
                    currentGroup.add(p);
                }
                endLoad(count, (data.length/3)*count);
            }
        }

        async function runSimpleChain() {
            startLoad();
            const count = parseInt(document.getElementById('simple-chain').value);
            const data = await fetchPoints(`${BASE_PATH}part1.npy`);
            if (data) {
                for (let i = 0; i < count; i++) {
                    const p = createPoints(data, 0x00ffcc);
                    p.position.z = i * STEP_Z_OLD;
                    if (i % 2 !== 0) p.rotation.set(Math.PI, 0, 0); // Твой проверенный поворот
                    currentGroup.add(p);
                }
                endLoad(count, (data.length/3)*count);
            }
        }

        async function buildRingFolder(folder, count) {
            startLoad();
            let pts = 0;
            for (let i = 1; i <= count; i++) {
                const data = await fetchPoints(`${RINGS_PATH}${folder}/part${i}.npy`);
                if (data) {
                    currentGroup.add(createPoints(data, 0x00ffcc));
                    pts += data.length / 3;
                }
            }
            endLoad(count, pts);
        }

        // --- ИСПРАВЛЕННАЯ ЦЕПОЧКА МАТРЕШЕК ---
        async function buildFractalChain() {
            startLoad();
            const levels = parseInt(document.getElementById('nest-levels').value);
            const chainLen = parseInt(document.getElementById('nest-chain').value);
            const data = await fetchPoints(`${BASE_PATH}part1.npy`); // Берем базу

            if (data) {
                let totalSpirals = 0;
                for (let c = 0; c < chainLen; c++) {
                    const linkGroup = new THREE.Group();
                    // Выращиваем матрешку внутри группы
                    generateRecursive(data, 1, levels, new THREE.Vector3(0,0,0), 1, linkGroup);
                    
                    // Ставим группу в цепь по твоему старому шагу
                    linkGroup.position.z = c * STEP_Z_OLD;
                    
                    // ПРИМЕНЯЕМ ТВОЙ ПРОВЕРЕННЫЙ ПОВОРОТ ДЛЯ КАЖДОГО ВТОРОГО ЗВЕНА
                    if (c % 2 !== 0) {
                        linkGroup.rotation.set(Math.PI, 0, 0);
                    }
                    
                    currentGroup.add(linkGroup);
                    totalSpirals += (Math.pow(2, levels) - 1);
                }
                endLoad(totalSpirals, (data.length/3)*totalSpirals);
            }
        }

        function generateRecursive(data, lvl, max, pos, scale, group) {
            const colors = [0x00ffcc, 0x00aaff, 0xffcc00, 0xff5500, 0xff00ff];
            const p = createPoints(data, colors[(lvl-1)%5], scale, lvl===1?0.4:0.9);
            p.position.copy(pos);
            p.scale.set(scale, scale, scale);
            group.add(p);
            if (lvl < max) {
                const s = scale * 0.5;
                // Те самые смещения +/- 75 и +/- 93.12
                generateRecursive(data, lvl+1, max, new THREE.Vector3(pos.x - OFFSET_X*scale, pos.y, pos.z + OFFSET_Z*scale), s, group);
                generateRecursive(data, lvl+1, max, new THREE.Vector3(pos.x + OFFSET_X*scale, pos.y, pos.z - OFFSET_Z*scale), s, group);
            }
        }

        function startLoad() { scene.remove(currentGroup); currentGroup = new THREE.Group(); scene.add(currentGroup); document.getElementById('loader').style.display = 'flex'; }
        function endLoad(inst, pts) { 
            document.getElementById('inst-count').innerText = inst; 
            document.getElementById('count').innerText = pts.toLocaleString(); 
            document.getElementById('loader').style.display = 'none'; 
            setTimeout(centerView, 100); 
        }

        function centerView() {
            const box = new THREE.Box3().setFromObject(currentGroup);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            controls.target.copy(center);
            camera.position.set(center.x, center.y, center.z + Math.max(size.x, size.y, size.z)*1.5);
            controls.update();
        }

        function toggleUI() { const ui = document.getElementById('gideon-ui'); ui.style.display = ui.style.display==='none'?'block':'none'; }
        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
