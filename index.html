<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GIDEON Engine v9.6.2 - Precision Fractal</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #00ffcc; }
        .controls-container { position: fixed; top: 20px; right: 20px; z-index: 2001; }
        .control-btn { background: #000; color: #ffcc00; border: 1px solid #ffcc00; width: 35px; height: 35px; cursor: pointer; border-radius: 3px; display: flex; align-items: center; justify-content: center; }
        #gideon-ui { position: fixed; top: 70px; right: 20px; background: rgba(0, 10, 10, 0.95); padding: 15px; border: 1px solid #00ffcc; z-index: 1000; width: 300px; max-height: calc(100vh - 120px); overflow-y: auto; border-radius: 4px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.3); }
        h2 { font-size: 13px; margin: 0 0 15px 0; border-bottom: 1px solid #00ffcc; padding-bottom: 8px; text-align: center; }
        .cat-group { margin-bottom: 15px; background: rgba(0,30,30,0.3); padding: 10px; border-radius: 4px; }
        .cat-header { font-size: 10px; color: #ffcc00; margin-bottom: 8px; text-transform: uppercase; border-left: 2px solid #ffcc00; padding-left: 8px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 5px; }
        input { background: #000; border: 1px solid #00ffcc33; color: #ffcc00; width: 45px; padding: 4px; font-size: 10px; }
        .m-btn { background: rgba(0, 40, 40, 0.4); border: 1px solid #00ffcc33; color: #aaffff; padding: 6px; font-size: 9px; cursor: pointer; border-radius: 2px; text-align: center; }
        .m-btn:hover { border-color: #00ffcc; background: rgba(0, 60, 60, 0.6); }
        .m-btn.action { background: rgba(0, 80, 80, 0.6); border: 1px solid #00ffcc; color: #fff; font-weight: bold; padding: 10px; margin-top: 5px; width: 100%; font-size: 10px; }
        #stats { font-size: 11px; margin-top: 15px; border-top: 1px solid #00ffcc33; padding-top: 10px; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .stat-label { color: #55aaaa; text-transform: uppercase; font-size: 9px; }
        .stat-value { color: #00ffcc; font-weight: bold; }
        #loader { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:2000; color:#00ffcc; }
    </style>
</head>
<body>

    <div id="loader">GIDEON: ТОПОЛОГИЧЕСКИЙ СИНТЕЗ...</div>
    <div class="controls-container"><button class="control-btn" onclick="toggleUI()">≡</button></div>

    <div id="gideon-ui">
        <h2>GIDEON CORE v9.6.2</h2>
        
        <div class="cat-group">
            <div class="cat-header">🧱 БАЗА / ДИПОЛЬ / ЦЕПЬ</div>
            <div class="btn-grid">
                <button class="m-btn" onclick="buildBase(1)">BASE x1</button>
                <button class="m-btn" onclick="buildBase(2)">DIPOLE x2</button>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
                <span style="font-size:10px">ЗВЕНЬЕВ:</span>
                <input type="number" id="simple-chain" value="4">
                <button class="m-btn" onclick="runSimpleChain()" style="width:80px">BUILD</button>
            </div>
        </div>

        <div class="cat-group">
            <div class="cat-header">🧬 ГЕОМЕТРИЧЕСКИЙ ФРАКТАЛ</div>
            <div class="btn-grid">
                <button class="m-btn" style="border-color:#ffcc00; color:#ffcc00;" onclick="buildAutoDeepRing('ring3', 3)">MASTER RING x3</button>
                <button class="m-btn" style="border-color:#ffcc00; color:#ffcc00;" onclick="buildAutoDeepRing('ring4', 4)">MASTER RING x4</button>
            </div>
            <div style="font-size:8px; color:#55aaaa; text-align:center; margin-top:4px;">(Использует локальные якоря Alpha/Omega)</div>
        </div>

        <div class="cat-group">
            <div class="cat-header">🌀 АВТО-МАТРИЦА (МАТРЕШКА)</div>
            <div style="font-size:10px; margin-bottom:5px;">
                L (Уровни): <input type="number" id="nest-levels" value="4" min="1" max="6">
            </div>
            <div style="font-size:10px; margin-bottom:5px;">
                CH (Цепь): <input type="number" id="nest-chain" value="1">
            </div>
            <button class="m-btn action" onclick="buildFractalChain()">ПОСТРОИТЬ МАТРИЦУ</button>
        </div>

        <div id="stats">
            <div class="stat-row"><span class="stat-label">FPS</span><span id="fps-counter" class="stat-value">0</span></div>
            <div class="stat-row"><span class="stat-label">ВЕРШИН</span><span id="count" class="stat-value">0</span></div>
        </div>
        <button class="m-btn" style="width:100%; margin-top:10px; border-color:#ffcc00; color:#ffcc00;" onclick="centerView()">CENTER VIEW</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 10000000);
        camera.position.set(2500, 2500, 2500);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        let currentGroup = new THREE.Group();
        scene.add(currentGroup);

        const RINGS_PATH = 'models/static/rings/';
        const STEP_Z_OLD = 372.47; 
        const OFFSET_X = 75; const OFFSET_Z = 93.12;
        let baseDataArray = null;
        let framesThisSecond = 0, lastFpsUpdate = performance.now();

        async function loadProtectedCore() {
            const parts = ['p1.npy', 'p2.npy', 'p3.npy', 'p4.npy'];
            let combined = [];
            document.getElementById('loader').style.display = 'flex';
            try {
                for (let p of parts) {
                    const res = await fetch(`models/core_v8/${p}`);
                    const buffer = await res.arrayBuffer();
                    combined.push(...new Float32Array(buffer.slice(128)));
                }
                baseDataArray = new Float32Array(combined);
            } catch (e) { console.error(e); }
            document.getElementById('loader').style.display = 'none';
        }

        async function fetchPoints(path) {
            try {
                const res = await fetch(path);
                if (!res.ok) return null;
                const buffer = await res.arrayBuffer();
                return new Float32Array(buffer.slice(128));
            } catch (e) { return null; }
        }

        function createPoints(data, color, scale = 1, opacity = 0.8) {
            const geo = new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(data, 3));
            return new THREE.Points(geo, new THREE.PointsMaterial({ color, size: 2 * scale, transparent: true, opacity }));
        }

        async function buildBase(count) {
            if (!baseDataArray) await loadProtectedCore();
            reset();
            for (let i = 0; i < count; i++) {
                const p = createPoints(baseDataArray, 0x00ffcc);
                if (i === 1) p.rotation.set(Math.PI, 0, Math.PI);
                currentGroup.add(p);
            }
            finalize((baseDataArray.length/3)*count);
        }

        async function runSimpleChain() {
            if (!baseDataArray) await loadProtectedCore();
            reset();
            const count = parseInt(document.getElementById('simple-chain').value);
            for (let i = 0; i < count; i++) {
                const p = createPoints(baseDataArray, 0x00ffcc);
                p.position.z = i * STEP_Z_OLD;
                if (i % 2 !== 0) p.rotation.set(Math.PI, 0, 0);
                currentGroup.add(p);
            }
            finalize((baseDataArray.length/3)*count);
        }

        // --- ИСПРАВЛЕННЫЙ MASTER RING: ЛОКАЛЬНАЯ РЕКУРСИЯ ---
        async function buildAutoDeepRing(folder, count) {
            reset();
            document.getElementById('loader').style.display = 'flex';
            const maxLevel = parseInt(document.getElementById('nest-levels').value);
            let totalPts = 0;

            for (let i = 1; i <= count; i++) {
                const data = await fetchPoints(`${RINGS_PATH}${folder}/${i}/part1.npy`);
                if (data) {
                    const branchRoot = new THREE.Group();
                    generateManualRecursive(data, 1, maxLevel, branchRoot);
                    currentGroup.add(branchRoot);
                    totalPts += (data.length / 3) * (Math.pow(2, maxLevel) - 1);
                }
            }
            document.getElementById('loader').style.display = 'none';
            finalize(totalPts);
        }

        function generateManualRecursive(data, lvl, max, parentGroup) {
            const colors = [0x00ffcc, 0x00aaff, 0xffcc00, 0xff5500];
            
            // Сама сфираль
            const p = createPoints(data, colors[(lvl-1)%4], 1, 0.9 / lvl);
            parentGroup.add(p);

            if (lvl < max) {
                const nextScale = 0.5;

                // Дочка 1: В "корневой" якорь Alpha [-150, 0, -186.2]
                const sub1 = new THREE.Group();
                sub1.scale.set(nextScale, nextScale, nextScale);
                sub1.position.set(-150, 0, -186.2);
                parentGroup.add(sub1);
                generateManualRecursive(data, lvl + 1, max, sub1);

                // Дочка 2: В "центральный" якорь Omega [0, 0, 0]
                const sub2 = new THREE.Group();
                sub2.scale.set(nextScale, nextScale, nextScale);
                sub2.position.set(0, 0, 0);
                parentGroup.add(sub2);
                generateManualRecursive(data, lvl + 1, max, sub2);
            }
        }

        async function buildFractalChain() {
            if (!baseDataArray) await loadProtectedCore();
            reset();
            const levels = parseInt(document.getElementById('nest-levels').value);
            const chainLen = parseInt(document.getElementById('nest-chain').value);
            for (let c = 0; c < chainLen; c++) {
                const linkGroup = new THREE.Group();
                generateRecursive(1, levels, new THREE.Vector3(0,0,0), 1, linkGroup);
                linkGroup.position.z = c * STEP_Z_OLD;
                if (c % 2 !== 0) linkGroup.rotation.set(Math.PI, 0, 0);
                currentGroup.add(linkGroup);
            }
            const total = chainLen * (Math.pow(2, levels) - 1);
            finalize((baseDataArray.length/3)*total);
        }

        function generateRecursive(lvl, max, pos, scale, group) {
            const colors = [0x00ffcc, 0x00aaff, 0xffcc00, 0xff5500, 0xff00ff];
            const p = createPoints(baseDataArray, colors[(lvl-1)%5], scale, lvl===1?0.4:0.9);
            p.position.copy(pos); p.scale.set(scale, scale, scale);
            group.add(p);
            if (lvl < max) {
                const nextS = scale * 0.5; const oX = OFFSET_X * scale, oZ = OFFSET_Z * scale;
                generateRecursive(lvl+1, max, new THREE.Vector3(pos.x - oX, pos.y, pos.z - oZ), nextS, group);
                generateRecursive(lvl+1, max, new THREE.Vector3(pos.x + oX, pos.y, pos.z + oZ), nextS, group);
            }
        }

        function reset() { scene.remove(currentGroup); currentGroup = new THREE.Group(); scene.add(currentGroup); }
        function finalize(pts) { 
            document.getElementById('count').innerText = Math.round(pts).toLocaleString(); 
            setTimeout(centerView, 150); 
        }

        function animate() {
            requestAnimationFrame(animate);
            framesThisSecond++;
            const now = performance.now();
            if (now - lastFpsUpdate >= 1000) {
                document.getElementById('fps-counter').innerText = Math.round(framesThisSecond * 1000 / (now - lastFpsUpdate));
                framesThisSecond = 0; lastFpsUpdate = now;
            }
            controls.update(); renderer.render(scene, camera);
        }

        function centerView() {
            const box = new THREE.Box3().setFromObject(currentGroup);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            controls.target.copy(center);
            camera.position.set(center.x, center.y, center.z + Math.max(size.x, size.y, size.z)*1.5);
            controls.update();
        }

        function toggleUI() { const ui = document.getElementById('gideon-ui'); ui.style.display = ui.style.display==='none'?'block':'none'; }

        loadProtectedCore().then(() => { buildBase(1); animate(); });
    </script>
</body>
</html>
