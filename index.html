<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GIDEON v10.4 - Eye Comfort High Contrast</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #00ffcc; }
        .controls-container { position: fixed; top: 20px; right: 20px; z-index: 2001; }
        .control-btn { background: #000; color: #ffcc00; border: 1px solid #ffcc00; width: 35px; height: 35px; cursor: pointer; border-radius: 3px; display: flex; align-items: center; justify-content: center; }
        #gideon-ui { position: fixed; top: 70px; right: 20px; background: rgba(0, 5, 5, 0.95); padding: 15px; border: 1px solid #00ffcc; z-index: 1000; width: 300px; max-height: calc(100vh - 120px); overflow-y: auto; border-radius: 4px; box-shadow: 0 0 40px rgba(0, 255, 204, 0.3); }
        h2 { font-size: 13px; margin: 0 0 15px 0; border-bottom: 1px solid #00ffcc; padding-bottom: 8px; text-align: center; text-transform: uppercase; }
        .cat-group { margin-bottom: 15px; background: rgba(0,30,30,0.6); padding: 10px; border-radius: 4px; border: 1px solid #00ffcc44; }
        .cat-header { font-size: 10px; color: #ffcc00; margin-bottom: 8px; text-transform: uppercase; border-left: 4px solid #ffcc00; padding-left: 8px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 5px; }
        input { background: #000; border: 1px solid #00ffcc; color: #fff; padding: 5px; font-size: 10px; width: 100%; box-sizing: border-box; }
        .m-btn { background: rgba(0, 50, 50, 0.7); border: 1px solid #00ffcc88; color: #fff; padding: 10px; font-size: 9px; cursor: pointer; border-radius: 2px; text-align: center; transition: all 0.2s; }
        .m-btn:hover { background: #fff; color: #000; border-color: #fff; box-shadow: 0 0 15px #fff; }
        .m-btn.action { background: #00aaaa; border: 1px solid #00ffcc; font-weight: bold; padding: 14px; margin-top: 5px; width: 100%; font-size: 11px; text-shadow: 0 0 8px #fff; }
        #stats { font-size: 11px; margin-top: 15px; border-top: 1px solid #00ffcc44; padding-top: 10px; color: #ffcc00; }
        #loader { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); display:none; justify-content:center; align-items:center; z-index:2000; color:#fff; font-size: 18px; text-shadow: 0 0 10px #00ffcc; }
    </style>
</head>
<body>

    <div id="loader">ГЕНЕРАЦИЯ ВЫСОКОКОНТРАСТНОЙ СЕТИ...</div>
    <div class="controls-container"><button class="control-btn" onclick="toggleUI()">≡</button></div>

    <div id="gideon-ui">
        <h2>GIDEON CORE v10.4</h2>
        
        <div class="cat-group">
            <div class="cat-header">🧱 ГЛАВНЫЕ ЦЕПИ (WHITE)</div>
            <div class="btn-grid">
                <button class="m-btn" onclick="buildBase()">BASE</button>
                <button class="m-btn" onclick="runSimpleChain()">CHAIN x4</button>
            </div>
        </div>

        <div class="cat-group">
            <div class="cat-header">💍 КОЛЬЦА (Hierarchy)</div>
            <div style="font-size:9px; margin-bottom:5px; color:#aaffff;">ГЛУБИНА L (1-3):</div>
            <input type="number" id="manual-l-depth" value="3" min="1" max="3" style="margin-bottom:8px;">
            <div class="btn-grid">
                <button class="m-btn" onclick="buildManualRing('ring3', 3)">RING x3</button>
                <button class="m-btn" onclick="buildManualRing('ring4', 4)">RING x4</button>
            </div>
        </div>

        <div class="cat-group">
            <div class="cat-header">🌀 ГИПЕР-МАТРИЦА (L-Colors)</div>
            <div style="font-size:9px; margin-bottom:5px; color:#aaffff;">УРОВНИ: <input type="number" id="nest-levels" value="3" style="width:50px;"></div>
            <button class="m-btn action" onclick="buildFractalChain()">ПОСТРОИТЬ ГИПЕР-МОДЕЛЬ</button>
        </div>

        <div id="stats">
            <div style="display:flex; justify-content:space-between;"><span>АКТИВНЫХ ВЕРШИН:</span><span id="count">0</span></div>
        </div>
        <button class="m-btn" style="width:100%; margin-top:10px; border-color:#ffcc00; color:#ffcc00;" onclick="centerView()">CENTER VIEW</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 10000000);
        camera.position.set(3000, 3000, 3000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        let currentGroup = new THREE.Group();
        scene.add(currentGroup);

        const RINGS_PATH = 'models/static/rings/';
        const STEP_Z = 372.47; 
        const OFFSET_X = 75; const OFFSET_Z = 93.12;
        let baseDataArray = null;

        // ЯРКАЯ ИЕРАРХИЯ ДЛЯ ЗАЩИТЫ ЗРЕНИЯ
        const DEPTH_COLORS = [0xffffff, 0xffff00, 0x00ff00, 0xff00ff];

        async function loadProtectedCore() {
            const parts = ['p1.npy', 'p2.npy', 'p3.npy', 'p4.npy'];
            let combined = [];
            document.getElementById('loader').style.display = 'flex';
            try {
                for (let p of parts) {
                    const res = await fetch(`models/core_v8/${p}`);
                    const buffer = await res.arrayBuffer();
                    combined.push(...new Float32Array(buffer.slice(128)));
                }
                baseDataArray = new Float32Array(combined);
            } catch (e) { console.error(e); }
            document.getElementById('loader').style.display = 'none';
        }

        async function fetchPoints(path) {
            try {
                const res = await fetch(path);
                if (!res.ok) return null;
                const buffer = await res.arrayBuffer();
                return new Float32Array(buffer.slice(128));
            } catch (e) { return null; }
        }

        function createPoints(data, scale = 1, depthIndex = 0) {
            const geo = new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(data, 3));
            const finalColor = DEPTH_COLORS[depthIndex % DEPTH_COLORS.length];
            
            return new THREE.Points(geo, new THREE.PointsMaterial({ 
                color: finalColor, 
                size: 5.5 * scale,             // Увеличенный размер для четкости
                transparent: true, 
                opacity: 1.0, 
                blending: THREE.AdditiveBlending, 
                depthWrite: false,
                sizeAttenuation: true
            }));
        }

        async function buildBase() {
            if (!baseDataArray) await loadProtectedCore();
            reset();
            currentGroup.add(createPoints(baseDataArray, 1, 0)); 
            finalize(baseDataArray.length/3);
        }

        async function runSimpleChain() {
            if (!baseDataArray) await loadProtectedCore();
            reset();
            for (let i = 0; i < 4; i++) {
                const p = createPoints(baseDataArray, 1, 0);
                p.position.z = i * STEP_Z;
                if (i % 2 !== 0) p.rotation.x = Math.PI;
                currentGroup.add(p);
            }
            finalize((baseDataArray.length/3)*4);
        }

        async function buildManualRing(folder, count) {
            reset();
            const L = parseInt(document.getElementById('manual-l-depth').value);
            let pts = 0;
            for (let i = 1; i <= count; i++) {
                const main = await fetchPoints(`${RINGS_PATH}${folder}/${i}/part1.npy`);
                if (main) { currentGroup.add(createPoints(main, 1.2, 0)); pts += main.length/3; }
                if (L >= 2) {
                    const s1 = await fetchPoints(`${RINGS_PATH}${folder}/${i}/sub1/part1.npy`);
                    if (s1) { currentGroup.add(createPoints(s1, 0.8, 1)); pts += s1.length/3; }
                }
                if (L >= 3) {
                    const s2 = await fetchPoints(`${RINGS_PATH}${folder}/${i}/sub2/part1.npy`);
                    if (s2) { currentGroup.add(createPoints(s2, 0.6, 2)); pts += s2.length/3; }
                }
            }
            finalize(pts);
        }

        async function buildFractalChain() {
            if (!baseDataArray) await loadProtectedCore();
            reset();
            const levels = parseInt(document.getElementById('nest-levels').value);
            for (let c = 0; c < 4; c++) {
                const linkGroup = new THREE.Group();
                generateRecursive(1, levels, new THREE.Vector3(0,0,0), 1, linkGroup);
                linkGroup.position.z = c * STEP_Z;
                if (c % 2 !== 0) linkGroup.rotation.x = Math.PI;
                currentGroup.add(linkGroup);
            }
            finalize(0);
        }

        function generateRecursive(lvl, max, pos, scale, group) {
            const p = createPoints(baseDataArray, scale, lvl-1);
            p.position.copy(pos); p.scale.set(scale, scale, scale);
            group.add(p);
            if (lvl < max) {
                const nextS = scale * 0.5; 
                const oX = OFFSET_X * scale, oZ = OFFSET_Z * scale;
                generateRecursive(lvl+1, max, new THREE.Vector3(pos.x - oX, pos.y, pos.z - oZ), nextS, group);
                generateRecursive(lvl+1, max, new THREE.Vector3(pos.x + oX, pos.y, pos.z + oZ), nextS, group);
            }
        }

        function reset() { scene.remove(currentGroup); currentGroup = new THREE.Group(); scene.add(currentGroup); }
        function finalize(pts) { 
            if(pts > 0) document.getElementById('count').innerText = Math.round(pts).toLocaleString(); 
            setTimeout(centerView, 150); 
        }

        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        function centerView() {
            const box = new THREE.Box3().setFromObject(currentGroup);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            camera.position.set(center.x, center.y, center.z + Math.max(size.x, size.y, size.z)*1.8);
            controls.target.copy(center); controls.update();
        }
        function toggleUI() { const ui = document.getElementById('gideon-ui'); ui.style.display = ui.style.display==='none'?'block':'none'; }

        loadProtectedCore().then(() => { runSimpleChain(); animate(); });
    </script>
</body>
</html>
