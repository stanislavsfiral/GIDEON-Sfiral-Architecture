<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GIDEON v10.9 - Perfect Alignment</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #00ffcc; }
        .controls-container { position: fixed; top: 20px; right: 20px; z-index: 2001; }
        .control-btn { background: #000; color: #ffcc00; border: 1px solid #ffcc00; width: 35px; height: 35px; cursor: pointer; border-radius: 3px; display: flex; align-items: center; justify-content: center; }
        #gideon-ui { position: fixed; top: 70px; right: 20px; background: rgba(0, 5, 5, 0.95); padding: 15px; border: 2px solid #00ffcc; z-index: 1000; width: 300px; max-height: calc(100vh - 120px); overflow-y: auto; border-radius: 4px; box-shadow: 0 0 30px rgba(0, 255, 204, 0.4); }
        h2 { font-size: 13px; margin: 0 0 15px 0; border-bottom: 1px solid #00ffcc; padding-bottom: 8px; text-align: center; text-transform: uppercase; }
        .cat-group { margin-bottom: 15px; background: rgba(0,30,30,0.5); padding: 10px; border-radius: 4px; border: 1px solid #00ffcc33; }
        .cat-header { font-size: 10px; color: #ffcc00; margin-bottom: 8px; text-transform: uppercase; border-left: 3px solid #ffcc00; padding-left: 8px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 5px; }
        input { background: #000; border: 1px solid #00ffcc; color: #ffcc00; padding: 4px; font-size: 10px; width: 100%; box-sizing: border-box; }
        .m-btn { background: rgba(0, 40, 40, 0.6); border: 1px solid #00ffcc66; color: #fff; padding: 8px; font-size: 9px; cursor: pointer; border-radius: 2px; text-align: center; }
        .m-btn:hover { background: #fff; color: #000; }
        .m-btn.action { background: #008888; border: 1px solid #00ffcc; font-weight: bold; padding: 12px; margin-top: 5px; width: 100%; font-size: 11px; text-shadow: 0 0 5px #fff; }
        label { font-size: 9px; color: #aaffff; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="controls-container"><button class="control-btn" onclick="toggleUI()">≡</button></div>

    <div id="gideon-ui">
        <h2>GIDEON CORE v10.9</h2>
        
        <div class="cat-group">
            <div class="cat-header">🧬 ГЕНЕТИКА (СИНХРОНИЗАЦИЯ)</div>
            <label>РАДИУС (R):</label>
            <input type="range" id="param-r" min="10" max="200" value="70" oninput="updateLive()">
            <label>ВЫСОТА (HC):</label>
            <input type="range" id="param-hc" min="10" max="200" value="80" oninput="updateLive()">
            <label>S-УЗЕЛ (HS):</label>
            <input type="range" id="param-hs" min="5" max="100" value="20" oninput="updateLive()">
        </div>

        <div class="cat-group">
            <div class="cat-header">🧱 БАЗОВАЯ СБОРКА</div>
            <div class="btn-grid">
                <button class="m-btn" onclick="buildBase(1)">BASE x1</button>
                <button class="m-btn" onclick="buildBase(2)">DIPOLE x2</button>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
                <span style="font-size:9px">ЗВЕНЬЕВ:</span>
                <input type="number" id="simple-chain" value="4" style="width:40px; margin:0 5px;">
                <button class="m-btn" onclick="runSimpleChain()" style="flex-grow:1">BUILD CHAIN</button>
            </div>
        </div>

        <div class="cat-group">
            <div class="cat-header">🌀 ИДЕАЛЬНАЯ МАТРЕШКА</div>
            <div style="font-size:9px; margin-bottom:5px;">L-DEPTH: <input type="number" id="nest-levels" value="3" style="width:40px;"></div>
            <button class="m-btn action" onclick="buildFractalChain()">BUILD PERFECT MATRIX</button>
        </div>

        <div id="stats" style="font-size:11px; color:#ffcc00; padding-top:10px;">
            ВЕРШИН: <span id="count">0</span>
        </div>
        <button class="m-btn" style="width:100%; margin-top:10px; border-color:#ffcc00; color:#ffcc00;" onclick="centerView()">CENTER VIEW</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 10000000);
        camera.position.set(3000, 3000, 3000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        let currentGroup = new THREE.Group();
        scene.add(currentGroup);

        const DEPTH_COLORS = [0xffffff, 0xffff00, 0x00ff00, 0xff00ff];

        function generateSfiralGeometry() {
            const r = parseFloat(document.getElementById('param-r').value);
            const hc = parseFloat(document.getElementById('param-hc').value);
            const hs = parseFloat(document.getElementById('param-hs').value);
            const res = 600;
            const r_a = r / 2.0;
            let pts = [];

            // Центрирование по Z: вычитаем половину общей высоты (hc + hs/2)
            const zOffset = (hc + hs / 2) / 2;

            for (let i = 0; i <= Math.floor(res * 0.3); i++) {
                let t = i / (res * 0.3);
                let phi = Math.PI * (1 - t);
                pts.push(r_a + r_a * Math.cos(phi), -r_a * Math.sin(phi), (hs / 2) * t - zOffset);
            }
            for (let i = 1; i <= Math.floor(res * 0.7); i++) {
                let t = i / (res * 0.7);
                pts.push(r * Math.cos(2 * Math.PI * t), r * Math.sin(2 * Math.PI * t), (hs / 2) + hc * t - zOffset);
            }

            let fullPts = [];
            for (let i = pts.length - 3; i >= 0; i -= 3) {
                fullPts.push(-pts[i], -pts[i+1], -pts[i+2]);
            }
            fullPts.push(...pts);
            return new Float32Array(fullPts);
        }

        function createPoints(data, scale = 1, depthIndex = 0) {
            const geo = new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(data, 3));
            return new THREE.Points(geo, new THREE.PointsMaterial({ 
                color: DEPTH_COLORS[depthIndex % DEPTH_COLORS.length], 
                size: 5.5 * scale,
                transparent: true, opacity: 1.0,
                blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true
            }));
        }

        function updateLive() {
            if (currentGroup.children.length === 1) buildBase(1);
        }

        async function buildBase(count) {
            reset();
            const data = generateSfiralGeometry();
            for (let i = 0; i < count; i++) {
                const p = createPoints(data, 1, 0);
                if (i === 1) p.rotation.set(Math.PI, 0, Math.PI);
                currentGroup.add(p);
            }
            finalize(data.length / 3 * count);
        }

        async function runSimpleChain() {
            reset();
            const count = parseInt(document.getElementById('simple-chain').value);
            const data = generateSfiralGeometry();
            const hc = parseFloat(document.getElementById('param-hc').value);
            const hs = parseFloat(document.getElementById('param-hs').value);
            const dynamicStep = (hc + hs/2) * 2;

            for (let i = 0; i < count; i++) {
                const p = createPoints(data, 1, 0);
                p.position.z = i * dynamicStep;
                if (i % 2 !== 0) p.rotation.x = Math.PI;
                currentGroup.add(p);
            }
            finalize(data.length / 3 * count);
        }

        async function buildFractalChain() {
            reset();
            const levels = parseInt(document.getElementById('nest-levels').value);
            const data = generateSfiralGeometry();
            const hc = parseFloat(document.getElementById('param-hc').value);
            const hs = parseFloat(document.getElementById('param-hs').value);
            const dynamicStep = (hc + hs/2) * 2;

            for (let c = 0; c < 4; c++) {
                const linkGroup = new THREE.Group();
                generateRecursive(1, levels, new THREE.Vector3(0,0,0), 1, linkGroup, data);
                linkGroup.position.z = c * dynamicStep;
                if (c % 2 !== 0) linkGroup.rotation.x = Math.PI;
                currentGroup.add(linkGroup);
            }
            finalize(0);
        }

        function generateRecursive(lvl, max, pos, scale, group, data) {
            const p = createPoints(data, scale, lvl-1);
            p.position.copy(pos); p.scale.set(scale, scale, scale);
            group.add(p);
            if (lvl < max) {
                const nextS = scale * 0.5;
                const r = parseFloat(document.getElementById('param-r').value);
                const hc = parseFloat(document.getElementById('param-hc').value);
                
                // ИДЕАЛЬНОЕ СМЕЩЕНИЕ: привязано к геометрии Олега
                const offsetX = r * scale;
                const offsetZ = hc * scale; 

                generateRecursive(lvl+1, max, new THREE.Vector3(pos.x - offsetX, pos.y, pos.z - offsetZ), nextS, group, data);
                generateRecursive(lvl+1, max, new THREE.Vector3(pos.x + offsetX, pos.y, pos.z + offsetZ), nextS, group, data);
            }
        }

        function reset() { scene.remove(currentGroup); currentGroup = new THREE.Group(); scene.add(currentGroup); }
        function finalize(pts) { 
            if(pts > 0) document.getElementById('count').innerText = Math.round(pts).toLocaleString(); 
        }
        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        function centerView() {
            const box = new THREE.Box3().setFromObject(currentGroup);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            camera.position.set(center.x, center.y, center.z + Math.max(size.x, size.y, size.z)*2);
            controls.target.copy(center); controls.update();
        }
        function toggleUI() { const ui = document.getElementById('gideon-ui'); ui.style.display = ui.style.display==='none'?'block':'none'; }
        
        buildBase(1);
        animate();
    </script>
</body>
</html>
