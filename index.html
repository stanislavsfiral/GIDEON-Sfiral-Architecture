<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GIDEON Engine v7.8 - Fractal Stream</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #00ffcc; }
        .controls-container { position: fixed; top: 20px; right: 20px; z-index: 2001; }
        .control-btn { background: #000; color: #ffcc00; border: 1px solid #ffcc00; width: 35px; height: 35px; cursor: pointer; border-radius: 3px; display: flex; align-items: center; justify-content: center; }
        #gideon-ui { position: fixed; top: 70px; right: 20px; background: rgba(0, 10, 10, 0.95); padding: 15px; border: 1px solid #00ffcc; z-index: 1000; width: 300px; max-height: calc(100vh - 120px); overflow-y: auto; border-radius: 4px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.3); }
        h2 { font-size: 13px; margin: 0 0 15px 0; border-bottom: 2px solid #00ffcc; padding-bottom: 8px; text-align: center; }
        .cat-group { margin-bottom: 15px; background: rgba(0,30,30,0.3); padding: 10px; border-radius: 4px; }
        .cat-header { font-size: 10px; color: #ffcc00; margin-bottom: 8px; text-transform: uppercase; border-left: 2px solid #ffcc00; padding-left: 8px; }
        .input-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 10px; }
        input { background: #000; border: 1px solid #00ffcc33; color: #ffcc00; width: 50px; padding: 4px; font-size: 10px; }
        .m-btn { background: rgba(0, 60, 60, 0.4); border: 1px solid #00ffcc; color: #fff; width: 100%; padding: 10px; font-size: 11px; cursor: pointer; transition: 0.3s; font-weight: bold; border-radius: 2px; }
        .m-btn:hover { background: #00ffcc; color: #000; }
        #stats { font-size: 10px; margin-top: 15px; border-top: 1px solid #00ffcc33; padding-top: 10px; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        #loader { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:2000; color:#00ffcc; font-size: 12px; }
    </style>
</head>
<body>

    <div id="loader">АНАЛИЗ S-МАТРИЦЫ И ГЕНЕРАЦИЯ ЦЕПИ...</div>

    <div class="controls-container">
        <button class="control-btn" onclick="toggleUI()">≡</button>
    </div>

    <div id="gideon-ui">
        <h2>GIDEON ENGINE v7.8</h2>
        
        <div class="cat-group">
            <div class="cat-header">🧬 КОНФИГУРАТОР ФРАКТАЛА</div>
            
            <div class="input-row">
                <span>ГЛУБИНА (LEVELS):</span>
                <input type="number" id="nest-levels" value="2" min="1" max="5">
            </div>
            
            <div class="input-row">
                <span>ЦЕПОЧКА (CHAIN):</span>
                <input type="number" id="nest-chain" value="1" min="1" max="50">
            </div>

            <button class="m-btn" onclick="buildFractalChain()">ПОСТРОИТЬ ФРАКТАЛЬНУЮ ЦЕПЬ</button>
        </div>

        <div id="stats">
            <div class="stat-row"><span>ВЕРШИН:</span> <span id="count" style="color:#00ffcc">0</span></div>
            <div class="stat-row"><span>СФИРАЛЕЙ:</span> <span id="inst-count" style="color:#ffcc00">0</span></div>
            <div class="stat-row"><span>FPS:</span> <span id="fps-counter">60</span></div>
        </div>
        <button style="width:100%; margin-top:10px; background:transparent; border:1px solid #ffcc00; color:#ffcc00; padding:5px; cursor:pointer; font-size:9px;" onclick="centerView()">CENTER VIEW</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000000);
        camera.position.set(2000, 2000, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        
        let currentGroup = new THREE.Group();
        scene.add(currentGroup);

        // Математические константы на основе присланных тобой файлов
        const OFFSET_X = 75;
        const OFFSET_Z = 93.12;
        const STEP_Z = 372.48; // Расстояние для стыковки макро-сфиралей в цепь

        async function buildFractalChain() {
            startLoad();
            const levels = parseInt(document.getElementById('nest-levels').value);
            const chainLen = parseInt(document.getElementById('nest-chain').value);
            
            // Загружаем базовую геометрию из папки матрешки
            const res = await fetch('models/static/rings/matreshka/1/part1.npy');
            const buffer = await res.arrayBuffer();
            const pointsArray = new Float32Array(buffer.slice(128));
            const baseGeo = new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(pointsArray, 3));

            let totalSpirals = 0;

            for (let c = 0; c < chainLen; c++) {
                const chainLinkGroup = new THREE.Group();
                
                // Генерируем матрешку внутри текущего звена цепи
                generateRecursive(baseGeo, 1, levels, new THREE.Vector3(0,0,0), 1, chainLinkGroup);
                
                // Позиционируем звено в цепи по оси Z
                chainLinkGroup.position.z = c * STEP_Z;
                
                // Принцип АНТИТЕЗЫ: каждая вторая матрешка зеркально развернута для сцепки S-петель
                if (c % 2 !== 0) {
                    chainLinkGroup.rotation.x = Math.PI;
                    chainLinkGroup.rotation.y = Math.PI;
                }

                currentGroup.add(chainLinkGroup);
                totalSpirals += (Math.pow(2, levels) - 1);
            }

            endLoad(totalSpirals, (pointsArray.length / 3) * totalSpirals);
        }

        function generateRecursive(geo, currentLevel, maxLevel, pos, scale, group) {
            const colors = [0x00ffcc, 0x00aaff, 0xffcc00, 0xff5500, 0xff00ff];
            
            const points = new THREE.Points(geo, new THREE.PointsMaterial({ 
                color: colors[(currentLevel - 1) % colors.length], 
                size: 2 * scale,
                transparent: true,
                opacity: currentLevel === 1 ? 0.4 : 0.9
            }));
            
            points.position.copy(pos);
            points.scale.set(scale, scale, scale);
            group.add(points);

            if (currentLevel < maxLevel) {
                const nextScale = scale * 0.5;
                const offX = OFFSET_X * scale;
                const offZ = OFFSET_Z * scale;

                // Порождаем два антисимметричных "потомка"
                generateRecursive(geo, currentLevel + 1, maxLevel, 
                    new THREE.Vector3(pos.x - offX, pos.y, pos.z + offZ), nextScale, group);
                
                generateRecursive(geo, currentLevel + 1, maxLevel, 
                    new THREE.Vector3(pos.x + offX, pos.y, pos.z - offZ), nextScale, group);
            }
        }

        function startLoad() {
            scene.remove(currentGroup);
            currentGroup = new THREE.Group();
            scene.add(currentGroup);
            document.getElementById('loader').style.display = 'flex';
        }

        function endLoad(inst, pts) {
            document.getElementById('inst-count').innerText = inst;
            document.getElementById('count').innerText = pts.toLocaleString();
            document.getElementById('loader').style.display = 'none';
            setTimeout(centerView, 100);
        }

        function centerView() {
            const box = new THREE.Box3().setFromObject(currentGroup);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            controls.target.copy(center);
            camera.position.set(center.x + size.x, center.y + size.y, center.z + size.z);
            controls.update();
        }

        function toggleUI() { 
            const ui = document.getElementById('gideon-ui');
            ui.style.display = ui.style.display === 'none' ? 'block' : 'none';
        }

        let lastFpsUpdate = performance.now(), frames = 0;
        function animate() {
            requestAnimationFrame(animate);
            frames++;
            const now = performance.now();
            if (now - lastFpsUpdate >= 1000) {
                document.getElementById('fps-counter').innerText = frames;
                frames = 0; lastFpsUpdate = now;
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
