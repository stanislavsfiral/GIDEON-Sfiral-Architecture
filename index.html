<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GIDEON v11.0 - Core Generator</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #00ffcc; }
        .controls-container { position: fixed; top: 20px; right: 20px; z-index: 2001; }
        .control-btn { background: #000; color: #ffcc00; border: 1px solid #ffcc00; width: 35px; height: 35px; cursor: pointer; border-radius: 3px; display: flex; align-items: center; justify-content: center; }
        #gideon-ui { position: fixed; top: 70px; right: 20px; background: rgba(0, 5, 5, 0.95); padding: 15px; border: 2px solid #00ffcc; z-index: 1000; width: 300px; max-height: calc(100vh - 120px); overflow-y: auto; border-radius: 4px; box-shadow: 0 0 30px rgba(0, 255, 204, 0.4); }
        h2 { font-size: 13px; margin: 0 0 15px 0; border-bottom: 1px solid #00ffcc; padding-bottom: 8px; text-align: center; text-transform: uppercase; }
        .cat-group { margin-bottom: 15px; background: rgba(0,30,30,0.5); padding: 10px; border-radius: 4px; border: 1px solid #00ffcc33; }
        .cat-header { font-size: 10px; color: #ffcc00; margin-bottom: 8px; text-transform: uppercase; border-left: 3px solid #ffcc00; padding-left: 8px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 5px; }
        .m-btn { background: rgba(0, 40, 40, 0.6); border: 1px solid #00ffcc66; color: #fff; padding: 8px; font-size: 9px; cursor: pointer; border-radius: 2px; text-align: center; }
        .m-btn:hover { background: #fff; color: #000; }
        .m-btn.action { background: #008888; border: 1px solid #00ffcc; font-weight: bold; padding: 12px; margin-top: 5px; width: 100%; font-size: 11px; text-shadow: 0 0 5px #fff; }
        #stats { font-size: 11px; margin-top: 15px; border-top: 1px solid #00ffcc33; padding-top: 10px; color: #ffcc00; }
        #loader { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; justify-content:center; align-items:center; z-index:2000; color:#00ffcc; font-size: 20px; letter-spacing: 5px; }
    </style>
</head>
<body>

    <div id="loader">GIDEON: СБОРКА ЯДРА...</div>
    <div class="controls-container"><button class="control-btn" onclick="toggleUI()">≡</button></div>

    <div id="gideon-ui">
        <h2>GIDEON CORE v11.0</h2>
        
        <div class="cat-group">
            <div class="cat-header">⚛️ ГЕНЕРАТОР ЯДЕР (CORE)</div>
            <div class="btn-grid">
                <button class="m-btn" onclick="buildCore(10)">CORE x10 (36°)</button>
                <button class="m-btn" onclick="buildCore(9)">CORE x9 (40°)</button>
                <button class="m-btn" onclick="buildCore(8)">CORE x8 (45°)</button>
                <button class="m-btn" onclick="buildCore(6)">CORE x6 (60°)</button>
                <button class="m-btn" onclick="buildCore(5)">CORE x5 (72°)</button>
                <button class="m-btn" onclick="buildCore(4)">CORE x4 (90°)</button>
                <button class="m-btn" onclick="buildCore(3)">CORE x3 (120°)</button>
            </div>
        </div>

        <div class="cat-group">
            <div class="cat-header">🧱 БАЗОВАЯ ЦЕПЬ</div>
            <div class="btn-grid">
                <button class="m-btn" onclick="buildBase(1)">BASE x1</button>
                <button class="m-btn" onclick="buildBase(2)">DIPOLE x2</button>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
                <span style="font-size:9px">ЗВЕНЬЕВ:</span>
                <input type="number" id="simple-chain" value="4" style="width:40px; background:#000; border:1px solid #00ffcc; color:#ffcc00;">
                <button class="m-btn" onclick="runSimpleChain()" style="flex-grow:1; margin-left:5px;">BUILD CHAIN</button>
            </div>
        </div>

        <div class="cat-group">
            <div class="cat-header">🌀 МАТРИЦА (МАТРЕШКА)</div>
            <button class="m-btn action" onclick="buildFractalChain()">ПОСТРОИТЬ ГИПЕР-МОДЕЛЬ</button>
        </div>

        <div id="stats">
            <div style="display:flex; justify-content:space-between;"><span>ВЕРШИН:</span><span id="count">0</span></div>
        </div>
        <button class="m-btn" style="width:100%; margin-top:10px; border-color:#ffcc00; color:#ffcc00;" onclick="centerView()">CENTER VIEW</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 10000000);
        camera.position.set(3000, 3000, 3000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        let currentGroup = new THREE.Group();
        scene.add(currentGroup);

        let baseDataArray = null;
        const DEPTH_COLORS = [0xffffff, 0xffff00, 0x00ff00, 0xff00ff];

        async function loadProtectedCore() {
            const parts = ['p1.npy', 'p2.npy', 'p3.npy', 'p4.npy'];
            let combined = [];
            document.getElementById('loader').style.display = 'flex';
            try {
                for (let p of parts) {
                    const res = await fetch(`models/core_v8/${p}`);
                    const buffer = await res.arrayBuffer();
                    combined.push(...new Float32Array(buffer.slice(128)));
                }
                baseDataArray = new Float32Array(combined);
            } catch (e) { console.error(e); }
            document.getElementById('loader').style.display = 'none';
        }

        function createPoints(data, scale = 1, colorIndex = 0) {
            const geo = new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(data, 3));
            return new THREE.Points(geo, new THREE.PointsMaterial({ 
                color: DEPTH_COLORS[colorIndex % DEPTH_COLORS.length], 
                size: 5.5 * scale,
                transparent: true, opacity: 1.0, 
                blending: THREE.AdditiveBlending, 
                depthWrite: false, sizeAttenuation: true
            }));
        }

        // --- НОВАЯ ФУНКЦИЯ ЯДРА ---
        async function buildCore(count) {
            if (!baseDataArray) await loadProtectedCore();
            reset();
            const angleStep = (Math.PI * 2) / count;
            let pts = 0;

            for (let i = 0; i < count; i++) {
                // Создаем лепесток ядра (Диполь)
                const petal = new THREE.Group();
                
                const p1 = createPoints(baseDataArray, 1, 0); // Прямой виток
                const p2 = createPoints(baseDataArray, 1, 0); // Обратный виток
                p2.rotation.set(Math.PI, 0, Math.PI);
                
                petal.add(p1);
                petal.add(p2);
                
                // Раскрутка по кругу
                petal.rotation.y = i * angleStep;
                currentGroup.add(petal);
                pts += (baseDataArray.length / 3) * 2;
            }
            finalize(pts);
        }

        async function buildBase(count) {
            if (!baseDataArray) await loadProtectedCore();
            reset();
            for (let i = 0; i < count; i++) {
                const p = createPoints(baseDataArray, 1, 0);
                if (i === 1) p.rotation.set(Math.PI, 0, Math.PI);
                currentGroup.add(p);
            }
            finalize((baseDataArray.length/3) * count);
        }

        async function runSimpleChain() {
            if (!baseDataArray) await loadProtectedCore();
            reset();
            const count = parseInt(document.getElementById('simple-chain').value);
            for (let i = 0; i < count; i++) {
                const p = createPoints(baseDataArray, 1, 0);
                p.position.z = i * 372.47;
                if (i % 2 !== 0) p.rotation.x = Math.PI;
                currentGroup.add(p);
            }
            finalize((baseDataArray.length/3) * count);
        }

        async function buildFractalChain() {
            if (!baseDataArray) await loadProtectedCore();
            reset();
            const levels = 3;
            for (let c = 0; c < 4; c++) {
                const linkGroup = new THREE.Group();
                generateRecursive(1, levels, new THREE.Vector3(0,0,0), 1, linkGroup);
                linkGroup.position.z = c * 372.47;
                if (c % 2 !== 0) linkGroup.rotation.x = Math.PI;
                currentGroup.add(linkGroup);
            }
            finalize(0);
        }

        function generateRecursive(lvl, max, pos, scale, group) {
            const p = createPoints(baseDataArray, scale, lvl-1);
            p.position.copy(pos); p.scale.set(scale, scale, scale);
            group.add(p);
            if (lvl < max) {
                const nextS = scale * 0.5; 
                const oX = 75 * scale, oZ = 93.12 * scale;
                generateRecursive(lvl+1, max, new THREE.Vector3(pos.x - oX, pos.y, pos.z - oZ), nextS, group);
                generateRecursive(lvl+1, max, new THREE.Vector3(pos.x + oX, pos.y, pos.z + oZ), nextS, group);
            }
        }

        function reset() { scene.remove(currentGroup); currentGroup = new THREE.Group(); scene.add(currentGroup); }
        function finalize(pts) { 
            if(pts > 0) document.getElementById('count').innerText = Math.round(pts).toLocaleString(); 
            setTimeout(centerView, 150); 
        }
        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        function centerView() {
            const box = new THREE.Box3().setFromObject(currentGroup);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            camera.position.set(center.x, center.y, center.z + Math.max(size.x, size.y, size.z)*1.8);
            controls.target.copy(center); controls.update();
        }
        function toggleUI() { const ui = document.getElementById('gideon-ui'); ui.style.display = ui.style.display==='none'?'block':'none'; }

        loadProtectedCore().then(() => { buildCore(10); animate(); });
    </script>
</body>
</html>
