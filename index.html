<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GIDEON Engine v8.3 - Fractal Component System</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #00ffcc; }
        .controls-container { position: fixed; top: 20px; right: 20px; z-index: 2001; }
        .control-btn { background: #000; color: #ffcc00; border: 1px solid #ffcc00; width: 35px; height: 35px; cursor: pointer; border-radius: 3px; display: flex; align-items: center; justify-content: center; }
        #gideon-ui { position: fixed; top: 70px; right: 20px; background: rgba(0, 10, 10, 0.95); padding: 15px; border: 1px solid #00ffcc; z-index: 1000; width: 300px; max-height: calc(100vh - 120px); overflow-y: auto; border-radius: 4px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.3); }
        h2 { font-size: 13px; margin: 0 0 15px 0; border-bottom: 2px solid #00ffcc; padding-bottom: 8px; text-align: center; }
        .cat-group { margin-bottom: 15px; background: rgba(0,30,30,0.3); padding: 10px; border-radius: 4px; }
        .cat-header { font-size: 10px; color: #ffcc00; margin-bottom: 8px; text-transform: uppercase; border-left: 2px solid #ffcc00; padding-left: 8px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; margin-bottom: 5px; }
        .input-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 10px; }
        input { background: #000; border: 1px solid #00ffcc33; color: #ffcc00; width: 45px; padding: 4px; font-size: 10px; }
        .m-btn { background: rgba(0, 40, 40, 0.4); border: 1px solid #00ffcc33; color: #aaffff; padding: 6px; font-size: 9px; cursor: pointer; border-radius: 2px; text-align: center; }
        .m-btn:hover { border-color: #00ffcc; background: rgba(0, 60, 60, 0.6); }
        .m-btn.action { background: rgba(0, 80, 80, 0.6); border: 1px solid #00ffcc; color: #fff; font-weight: bold; padding: 10px; margin-top: 5px; width: 100%; font-size: 10px; }
        #stats { font-size: 10px; margin-top: 15px; border-top: 1px solid #00ffcc33; padding-top: 10px; }
        #loader { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:2000; color:#00ffcc; }
    </style>
</head>
<body>

    <div id="loader">GIDEON: СБОРКА ФРАКТАЛЬНОЙ ЦЕПИ...</div>

    <div class="controls-container">
        <button class="control-btn" onclick="toggleUI()">≡</button>
    </div>

    <div id="gideon-ui">
        <h2>GIDEON ENGINE v8.3</h2>
        
        <div class="cat-group">
            <div class="cat-header">⚙️ ГЛОБАЛЬНЫЕ НАСТРОЙКИ</div>
            <div class="input-row">
                <span>УРОВНИ ВЛОЖЕННОСТИ (L):</span>
                <input type="number" id="global-nest" value="2" min="1" max="5">
            </div>
        </div>

        <div class="cat-group">
            <div class="cat-header">⛓️ ЦЕПЬ МАТРЕШЕК</div>
            <div class="input-row">
                <span>ЗВЕНЬЕВ (N):</span>
                <input type="number" id="chain-count" value="4" min="1">
            </div>
            <button class="m-btn action" onclick="buildFractalChain()">ПОСТРОИТЬ ЦЕПЬ</button>
        </div>

        <div class="cat-group">
            <div class="cat-header">💍 КОЛЬЦА</div>
            <div class="btn-grid">
                <button class="m-btn" onclick="buildRing(3)">x3</button>
                <button class="m-btn" onclick="buildRing(4)">x4</button>
                <button class="m-btn" onclick="buildRing(6)">x6</button>
                <button class="m-btn" onclick="buildRing(8)">x8</button>
            </div>
        </div>

        <div id="stats">
            <div class="stat-row"><span>ОБЪЕКТОВ:</span> <span id="inst-count" style="color:#ffcc00">0</span></div>
            <div class="stat-row"><span>ВЕРШИН:</span> <span id="count" style="color:#00ffcc">0</span></div>
        </div>
        <button style="width:100%; margin-top:10px; background:transparent; border:1px solid #ffcc00; color:#ffcc00; padding:5px; cursor:pointer; font-size:9px;" onclick="centerView()">CENTER VIEW</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000000);
        camera.position.set(1500, 1500, 1500);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        let currentGroup = new THREE.Group();
        scene.add(currentGroup);

        // Константы стыковки
        const STEP_Z_OLD = 372.47; 
        const OFFSET_X = 75;
        const OFFSET_Z = 93.12;

        let baseData = null;

        // Инициализация - загружаем базу один раз
        async function init() {
            const res = await fetch('models/part1.npy');
            if (res.ok) {
                const buffer = await res.arrayBuffer();
                baseData = new Float32Array(buffer.slice(128));
                buildFractalChain(); // Сразу строим цепь при загрузке
            }
        }

        // Рекурсивная функция создания компонента (Матрешки)
        function createFractalNode(lvl, max, pos, scale, targetGroup) {
            const colors = [0x00ffcc, 0x00aaff, 0xffcc00, 0xff5500, 0xff00ff];
            const geo = new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(baseData, 3));
            const mat = new THREE.PointsMaterial({ 
                color: colors[(lvl-1)%5], 
                size: 2 * scale, 
                transparent: true, 
                opacity: lvl === 1 ? 0.4 : 0.9 
            });
            const p = new THREE.Points(geo, mat);
            p.position.copy(pos);
            p.scale.set(scale, scale, scale);
            targetGroup.add(p);

            if (lvl < max) {
                const s = scale * 0.5;
                createFractalNode(lvl+1, max, new THREE.Vector3(pos.x - OFFSET_X*scale, pos.y, pos.z + OFFSET_Z*scale), s, targetGroup);
                createFractalNode(lvl+1, max, new THREE.Vector3(pos.x + OFFSET_X*scale, pos.y, pos.z - OFFSET_Z*scale), s, targetGroup);
            }
        }

        // ПОСТРОЕНИЕ ЦЕПИ (Матрешка вместо сфиралей)
        function buildFractalChain() {
            startLoad();
            const count = parseInt(document.getElementById('chain-count').value);
            const levels = parseInt(document.getElementById('global-nest').value);
            
            for (let i = 0; i < count; i++) {
                const linkContainer = new THREE.Group();
                // Создаем матрешку нужной вложенности как один узел
                createFractalNode(1, levels, new THREE.Vector3(0,0,0), 1, linkContainer);
                
                linkContainer.position.z = i * STEP_Z_OLD;
                
                // Зеркальный разворот каждого второго звена для стыковки S-петель
                if (i % 2 !== 0) {
                    linkContainer.rotation.x = Math.PI;
                }
                
                currentGroup.add(linkContainer);
            }
            finalize(count, levels);
        }

        // ПОСТРОЕНИЕ КОЛЬЦА
        function buildRing(count) {
            startLoad();
            const levels = parseInt(document.getElementById('global-nest').value);
            const radius = 300 + (count * 50);
            for (let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2;
                const link = new THREE.Group();
                createFractalNode(1, levels, new THREE.Vector3(0,0,0), 1, link);
                link.position.set(Math.cos(angle)*radius, Math.sin(angle)*radius, 0);
                link.rotation.z = angle + Math.PI/2;
                currentGroup.add(link);
            }
            finalize(count, levels);
        }

        function startLoad() {
            scene.remove(currentGroup);
            currentGroup = new THREE.Group();
            scene.add(currentGroup);
            document.getElementById('loader').style.display = 'flex';
        }

        function finalize(count, levels) {
            const spiralsPerNode = Math.pow(2, levels) - 1;
            const totalSpirals = count * spiralsPerNode;
            document.getElementById('inst-count').innerText = totalSpirals;
            document.getElementById('count').innerText = (totalSpirals * (baseData.length/3)).toLocaleString();
            document.getElementById('loader').style.display = 'none';
            setTimeout(centerView, 100);
        }

        function centerView() {
            const box = new THREE.Box3().setFromObject(currentGroup);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            controls.target.copy(center);
            camera.position.set(center.x, center.y, center.z + Math.max(size.x, size.y, size.z)*1.5);
            controls.update();
        }

        function toggleUI() { const ui = document.getElementById('gideon-ui'); ui.style.display = ui.style.display==='none'?'block':'none'; }
        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }

        init();
        animate();
    </script>
</body>
</html>
