\<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GIDEON Engine v8.1 - Strict Geometry</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #00ffcc; }
        .controls-container { position: fixed; top: 20px; right: 20px; z-index: 2001; }
        .control-btn { background: #000; color: #ffcc00; border: 1px solid #ffcc00; width: 35px; height: 35px; cursor: pointer; border-radius: 3px; display: flex; align-items: center; justify-content: center; }
        #gideon-ui { position: fixed; top: 70px; right: 20px; background: rgba(0, 10, 10, 0.95); padding: 15px; border: 1px solid #00ffcc; z-index: 1000; width: 300px; max-height: calc(100vh - 120px); overflow-y: auto; border-radius: 4px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.3); }
        h2 { font-size: 13px; margin: 0 0 15px 0; border-bottom: 2px solid #00ffcc; padding-bottom: 8px; text-align: center; }
        .cat-group { margin-bottom: 15px; background: rgba(0,30,30,0.3); padding: 10px; border-radius: 4px; }
        .cat-header { font-size: 10px; color: #ffcc00; margin-bottom: 8px; text-transform: uppercase; border-left: 2px solid #ffcc00; padding-left: 8px; }
        .input-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 10px; }
        input { background: #000; border: 1px solid #00ffcc33; color: #ffcc00; width: 50px; padding: 4px; font-size: 10px; }
        .m-btn { background: rgba(0, 40, 40, 0.4); border: 1px solid #00ffcc33; color: #aaffff; padding: 8px; font-size: 9px; cursor: pointer; border-radius: 2px; text-align: center; width: 100%; margin-top: 4px; }
        .m-btn:hover { border-color: #00ffcc; background: rgba(0, 60, 60, 0.6); }
        #stats { font-size: 10px; margin-top: 15px; border-top: 1px solid #00ffcc33; padding-top: 10px; }
    </style>
</head>
<body>

    <div class="controls-container"><button class="control-btn" onclick="toggleUI()">≡</button></div>

    <div id="gideon-ui">
        <h2>GIDEON ENGINE v8.1</h2>
        
        <div class="cat-group">
            <div class="cat-header">🧩 ФРАКТАЛЬНЫЙ БЛОК</div>
            <div class="input-row">
                <span>ВЛОЖЕННОСТЬ:</span>
                <input type="number" id="nest-lvl" value="2" min="1" max="5">
            </div>
        </div>

        <div class="cat-group">
            <div class="cat-header">⛓️ ЦЕПЬ МАТРЕШЕК</div>
            <div class="input-row"><span>ЗВЕНЬЕВ:</span> <input type="number" id="ch-count" value="4"></div>
            <button class="m-btn" onclick="buildStrictChain()">ПОСТРОИТЬ ЦЕПЬ</button>
        </div>

        <div class="cat-group">
            <div class="cat-header">⭕ КОЛЬЦА МАТРЕШЕК</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                <button class="m-btn" onclick="buildStrictRing(4)">RING x4</button>
                <button class="m-btn" onclick="buildStrictRing(8)">RING x8</button>
            </div>
        </div>

        <div id="stats">
            <div class="stat-row"><span>СФИРАЛЕЙ:</span> <span id="inst-count" style="color:#ffcc00">0</span></div>
            <div class="stat-row"><span>ВЕРШИН:</span> <span id="count" style="color:#00ffcc">0</span></div>
        </div>
        <button style="width:100%; margin-top:10px; background:transparent; border:1px solid #ffcc00; color:#ffcc00; padding:5px; cursor:pointer; font-size:9px;" onclick="centerView()">CENTER VIEW</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        let currentGroup = new THREE.Group();
        scene.add(currentGroup);

        // ТВОИ КОНСТАНТЫ СТЫКОВКИ
        const STEP_Z = 372.47; 
        const OFFSET_X = 75;
        const OFFSET_Z = 93.12;

        let baseGeoData = null;

        async function init() {
            const res = await fetch('models/part1.npy');
            const buffer = await res.arrayBuffer();
            baseGeoData = new Float32Array(buffer.slice(128));
            buildStrictChain();
        }

        // Чистая функция создания фрактального узла (твоя Матрешка)
        function createFractalNode(lvl, max, pos, scale, target) {
            const colors = [0x00ffcc, 0x00aaff, 0xffcc00, 0xff5500, 0xff00ff];
            const geo = new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(baseGeoData, 3));
            const mat = new THREE.PointsMaterial({ color: colors[(lvl-1)%5], size: 2*scale, transparent: true, opacity: lvl===1?0.4:0.9 });
            const p = new THREE.Points(geo, mat);
            p.position.copy(pos);
            p.scale.set(scale, scale, scale);
            target.add(p);

            if (lvl < max) {
                const s = scale * 0.5;
                // Левая дочка
                createFractalNode(lvl+1, max, new THREE.Vector3(pos.x - OFFSET_X*scale, pos.y, pos.z + OFFSET_Z*scale), s, target);
                // Правая дочка
                createFractalNode(lvl+1, max, new THREE.Vector3(pos.x + OFFSET_X*scale, pos.y, pos.z - OFFSET_Z*scale), s, target);
            }
        }

        function buildStrictChain() {
            reset();
            const count = parseInt(document.getElementById('ch-count').value);
            const lvl = parseInt(document.getElementById('nest-lvl').value);
            
            for (let i = 0; i < count; i++) {
                const nodeGroup = new THREE.Group();
                createFractalNode(1, lvl, new THREE.Vector3(0,0,0), 1, nodeGroup);
                
                nodeGroup.position.z = i * STEP_Z;
                // Чередование для правильной сцепки S-петли
                if (i % 2 !== 0) nodeGroup.rotation.x = Math.PI;
                
                currentGroup.add(nodeGroup);
            }
            finalize(count * (Math.pow(2, lvl)-1));
        }

        function buildStrictRing(count) {
            reset();
            const lvl = parseInt(document.getElementById('nest-lvl').value);
            const radius = 400 + (count * 40);
            for (let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2;
                const nodeGroup = new THREE.Group();
                createFractalNode(1, lvl, new THREE.Vector3(0,0,0), 1, nodeGroup);
                
                nodeGroup.position.set(Math.cos(angle)*radius, Math.sin(angle)*radius, 0);
                nodeGroup.rotation.z = angle + Math.PI/2;
                currentGroup.add(nodeGroup);
            }
            finalize(count * (Math.pow(2, lvl)-1));
        }

        function reset() { scene.remove(currentGroup); currentGroup = new THREE.Group(); scene.add(currentGroup); }
        
        function finalize(inst) {
            document.getElementById('inst-count').innerText = inst;
            document.getElementById('count').innerText = (inst * (baseGeoData.length/3)).toLocaleString();
            setTimeout(centerView, 100);
        }

        function centerView() {
            const box = new THREE.Box3().setFromObject(currentGroup);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            controls.target.copy(center);
            camera.position.set(center.x, center.y, center.z + Math.max(size.x, size.y, size.z)*1.5);
            controls.update();
        }

        function toggleUI() { const ui = document.getElementById('gideon-ui'); ui.style.display = ui.style.display==='none'?'block':'none'; }
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        
        init();
        animate();
    </script>
</body>
</html>
