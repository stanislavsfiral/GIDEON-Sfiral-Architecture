<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GIDEON Engine v6.4</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #00ffcc; }
        .controls-container { position: fixed; top: 20px; right: 20px; z-index: 2001; }
        .control-btn { background: #000; color: #ffcc00; border: 1px solid #ffcc00; width: 35px; height: 35px; cursor: pointer; border-radius: 3px; display: flex; align-items: center; justify-content: center; }
        #gideon-ui { position: fixed; top: 70px; right: 20px; background: rgba(0, 10, 10, 0.95); padding: 15px; border: 1px solid #00ffcc; z-index: 1000; width: 280px; max-height: calc(100vh - 120px); overflow-y: auto; border-radius: 4px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.3); }
        h2 { font-size: 13px; margin: 0 0 15px 0; border-bottom: 1px solid #00ffcc33; padding-bottom: 8px; text-align: center; }
        .cat-group { margin-bottom: 15px; }
        .cat-header { font-size: 10px; color: #ffcc00; margin-bottom: 5px; text-transform: uppercase; border-left: 2px solid #ffcc00; padding-left: 8px; }
        .m-btn { background: rgba(0, 40, 40, 0.4); border: 1px solid #00ffcc33; color: #aaffff; padding: 6px; font-size: 9px; cursor: pointer; margin: 2px; border-radius: 2px; width: calc(50% - 6px); transition: 0.2s; }
        .m-btn:hover { border-color: #00ffcc; background: rgba(0, 60, 60, 0.6); }
        #stats { font-size: 10px; margin-top: 15px; background: rgba(0, 20, 20, 0.8); padding: 10px; border-radius: 2px; }
        #loader { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:2000; color:#00ffcc; }
    </style>
</head>
<body>

    <div id="loader">GIDEON: ВОССТАНОВЛЕНИЕ СВЯЗЕЙ...</div>

    <div class="controls-container">
        <button class="control-btn" onclick="toggleUI()">≡</button>
    </div>

    <div id="gideon-ui">
        <h2>GIDEON ENGINE v6.4</h2>
        
        <div class="cat-group">
            <div class="cat-header">🧱 БАЗОВЫЕ</div>
            <button class="m-btn" onclick="buildBase(1)">СФИРАЛЬ</button>
            <button class="m-btn" onclick="buildBase(2)">ДИПОЛЬ</button>
        </div>

        <div class="cat-group">
            <div class="cat-header">💍 КОЛЬЦА</div>
            <button class="m-btn" onclick="buildRingGroup(3)">RING x3</button>
        </div>

        <div class="cat-group">
            <div class="cat-header">🛰️ ЯДРА</div>
            <button class="m-btn" onclick="buildCore(60)">ШИНА 60°</button>
            <button class="m-btn" onclick="buildCore(120)">ЯДРО 120°</button>
        </div>
        
        <div id="stats">
            <div>ДЕТАЛЕЙ: <span id="inst-count">0</span></div>
            <div>ВЕРШИН: <span id="count">0</span></div>
        </div>
        <button style="width:100%; margin-top:10px; background:transparent; border:1px solid #ffcc00; color:#ffcc00; padding:8px; cursor:pointer; font-size:10px; border-radius:2px;" onclick="centerView()">CENTER VIEW</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000000);
        camera.position.set(800, 800, 800);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        let currentGroup = null;

        // ПУТЬ К КОРНЮ МОДЕЛЕЙ
        const BASE_PATH = 'models/';

        async function buildRingGroup(count) {
            startLoad();
            let totalPoints = 0;
            for (let i = 1; i <= count; i++) {
                const geo = await fetchGeo(`${BASE_PATH}part${i}.npy`);
                if (geo) {
                    currentGroup.add(new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x00ffcc, size: 2 })));
                    totalPoints += geo.attributes.position.count;
                }
            }
            endLoad(count, totalPoints);
        }

        async function buildCore(angle) {
            startLoad();
            const geo = await fetchGeo(`${BASE_PATH}part1.npy`);
            if (geo) {
                const step = (angle * Math.PI) / 180;
                for (let i = 0; i < 3; i++) {
                    const p = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x00ffcc, size: 2 }));
                    p.rotation.y = step * i;
                    currentGroup.add(p);
                }
                endLoad(3, geo.attributes.position.count * 3);
            }
        }

        async function buildBase(count) {
            startLoad();
            const geo = await fetchGeo(`${BASE_PATH}part1.npy`);
            if (geo) {
                for (let i = 0; i < count; i++) {
                    const p = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x00ffcc, size: 2 }));
                    if (i === 1) p.rotation.set(Math.PI, 0, Math.PI);
                    currentGroup.add(p);
                }
                endLoad(count, geo.attributes.position.count * count);
            }
        }

        async function fetchGeo(path) {
            try {
                const res = await fetch(path);
                if(!res.ok) return null;
                const buffer = await res.arrayBuffer();
                return new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(new Float32Array(buffer.slice(128)), 3));
            } catch(e) { return null; }
        }

        function startLoad() {
            if (currentGroup) scene.remove(currentGroup);
            currentGroup = new THREE.Group();
            scene.add(currentGroup);
            document.getElementById('loader').style.display = 'flex';
        }

        function endLoad(inst, pts) {
            document.getElementById('inst-count').innerText = inst;
            document.getElementById('count').innerText = pts;
            document.getElementById('loader').style.display = 'none';
            centerView();
        }

        function toggleUI() { 
            const ui = document.getElementById('gideon-ui');
            ui.style.display = ui.style.display === 'none' ? 'block' : 'none';
        }

        function centerView() {
            if (!currentGroup) return;
            const box = new THREE.Box3().setFromObject(currentGroup);
            const center = box.getCenter(new THREE.Vector3());
            controls.target.copy(center);
            controls.update();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        buildBase(1);
        animate();
    </script>
</body>
</html>
