<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIDEON v12.0 - 3D Core Synthesizer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #00ffcc; }
        .controls-container { position: fixed; top: 15px; right: 15px; z-index: 2001; }
        .control-btn { background: #000; color: #ffcc00; border: 1px solid #ffcc00; width: 40px; height: 40px; cursor: pointer; border-radius: 5px; font-size: 20px; }
        #gideon-ui { 
            position: fixed; top: 65px; right: 15px; 
            background: rgba(0, 5, 5, 0.9); 
            padding: 15px; border: 2px solid #00ffcc; 
            z-index: 1000; width: 280px; 
            max-height: 85vh; overflow-y: auto; 
            border-radius: 4px; box-shadow: 0 0 25px rgba(0, 255, 204, 0.3);
            scrollbar-width: thin; scrollbar-color: #00ffcc #000;
        }
        #gideon-ui::-webkit-scrollbar { width: 6px; }
        #gideon-ui::-webkit-scrollbar-track { background: #000; }
        #gideon-ui::-webkit-scrollbar-thumb { background: #00ffcc; border-radius: 10px; }
        h2 { font-size: 14px; margin: 0 0 15px 0; border-bottom: 1px solid #00ffcc; padding-bottom: 8px; text-align: center; color: #fff; }
        .cat-group { margin-bottom: 12px; background: rgba(0,30,30,0.4); padding: 10px; border-radius: 4px; border: 1px solid #00ffcc22; }
        .cat-header { font-size: 10px; color: #ffcc00; margin-bottom: 8px; text-transform: uppercase; border-left: 3px solid #ffcc00; padding-left: 8px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        input, select { background: #000; border: 1px solid #00ffcc; color: #ffcc00; padding: 4px; font-size: 11px; width: 100%; box-sizing: border-box; margin-bottom: 5px; }
        .m-btn { background: rgba(0, 40, 40, 0.6); border: 1px solid #00ffcc66; color: #fff; padding: 8px; font-size: 10px; cursor: pointer; border-radius: 2px; }
        .m-btn:hover { background: #00ffcc; color: #000; }
        .m-btn.action { background: #008888; border: 1px solid #00ffcc; width: 100%; margin-top: 5px; font-weight: bold; }
        #stats-box { position: fixed; bottom: 15px; left: 15px; font-size: 10px; color: #ffcc00; pointer-events: none; }
    </style>
</head>
<body>

    <div id="loader" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; color:#00ffcc; display:flex; justify-content:center; align-items:center; z-index:3000;">GIDEON: 3D СИНТЕЗ...</div>
    
    <div id="stats-box">
        FPS: <span id="fps">0</span> | POINTS: <span id="count">0</span>
    </div>

    <div class="controls-container"><button class="control-btn" onclick="toggleUI()">≡</button></div>

    <div id="gideon-ui">
        <h2>GIDEON CORE v12.0</h2>
        
        <div class="cat-group">
            <div class="cat-header">🌐 3D ГЕНЕРАТОР ЯДРА</div>
            <div style="font-size:9px; margin-bottom:2px;">ОСЬ ВРАЩЕНИЯ:</div>
            <select id="axis-select">
                <option value="y">ОСЬ Y (ГОРИЗОНТ)</option>
                <option value="x">ОСЬ X (ВЕРТИКАЛЬ)</option>
                <option value="z">ОСЬ Z (ГЛУБИНА)</option>
            </select>
            <div style="font-size:9px; margin-bottom:2px;">КОЛ-ВО ДИПОЛЕЙ:</div>
            <input type="number" id="core-count" value="12">
            <div class="btn-grid">
                <button class="m-btn action" onclick="build3DCore(false)">НОВОЕ ЯДРО</button>
                <button class="m-btn action" style="background:#440066;" onclick="build3DCore(true)">ДОБАВИТЬ СЛОЙ</button>
            </div>
            <button class="m-btn" style="width:100%; margin-top:5px; border-color:#ff4444; color:#ff4444;" onclick="resetScene()">ОЧИСТИТЬ ВСЁ</button>
        </div>

        <div class="cat-group">
            <div class="cat-header">💍 КОЛЬЦА (RINGS)</div>
            <div class="btn-grid">
                <button class="m-btn" onclick="buildManualRing('ring3', 3)">RING x3</button>
                <button class="m-btn" onclick="buildManualRing('ring4', 4)">RING x4</button>
            </div>
        </div>

        <div class="cat-group">
            <div class="cat-header">🌀 МАТРИЦА (МАТРЕШКА)</div>
            <div style="font-size:9px;">L: <input type="number" id="nest-levels" value="3" style="width:40px;"> CH: <input type="number" id="nest-chain" value="4" style="width:40px;"></div>
            <button class="m-btn action" onclick="buildFractalChain()">BUILD MATRIX</button>
        </div>

        <button class="m-btn" style="width:100%; border-color:#ffcc00; color:#ffcc00;" onclick="centerView()">CENTER VIEW</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 10000000);
        camera.position.set(3000, 3000, 3000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        
        let currentGroup = new THREE.Group();
        scene.add(currentGroup);

        let baseDataArray = null;
        let lastTime = 0, frameCount = 0, totalPointsOnScreen = 0;
        const DEPTH_COLORS = [0xffffff, 0xffff00, 0x00ff00, 0xff00ff];

        async function loadProtectedCore() {
            const parts = ['p1.npy', 'p2.npy', 'p3.npy', 'p4.npy'];
            let combined = [];
            try {
                for (let p of parts) {
                    const res = await fetch(`models/core_v8/${p}`);
                    const buffer = await res.arrayBuffer();
                    combined.push(...new Float32Array(buffer.slice(128)));
                }
                baseDataArray = new Float32Array(combined);
            } catch (e) { console.error(e); }
            document.getElementById('loader').style.display = 'none';
        }

        function createPoints(data, scale = 1, colorIdx = 0) {
            const geo = new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(data, 3));
            return new THREE.Points(geo, new THREE.PointsMaterial({ 
                color: DEPTH_COLORS[colorIdx % 4], size: 5.5 * scale, 
                transparent: true, opacity: 1.0, blending: THREE.AdditiveBlending, depthWrite: false 
            }));
        }

        // --- ЛОГИКА 3D ЯДРА ---
        async function build3DCore(addLayer = false) {
            if (!baseDataArray) await loadProtectedCore();
            if (!addLayer) { resetScene(); totalPointsOnScreen = 0; }
            
            const count = parseInt(document.getElementById('core-count').value);
            const axis = document.getElementById('axis-select').value;
            const angleStep = (Math.PI * 2) / count;
            
            const layerGroup = new THREE.Group();
            let ptsCount = 0;

            for (let i = 0; i < count; i++) {
                const petal = new THREE.Group();
                const p1 = createPoints(baseDataArray, 1, addLayer ? 1 : 0);
                const p2 = createPoints(baseDataArray, 1, addLayer ? 1 : 0);
                p2.rotation.set(Math.PI, 0, Math.PI);
                petal.add(p1); petal.add(p2);
                
                // Вращение по выбранной оси
                if (axis === 'x') petal.rotation.x = i * angleStep;
                else if (axis === 'y') petal.rotation.y = i * angleStep;
                else if (axis === 'z') petal.rotation.z = i * angleStep;
                
                layerGroup.add(petal);
                ptsCount += (baseDataArray.length / 3) * 2;
            }
            
            currentGroup.add(layerGroup);
            totalPointsOnScreen += ptsCount;
            finalize(totalPointsOnScreen);
        }

        async function buildManualRing(folder, count) {
            resetScene(); totalPointsOnScreen = 0;
            // (Логика колец аналогична v11.2)
            finalize(0); // Упрощено для примера
        }

        async function buildFractalChain() {
            resetScene(); totalPointsOnScreen = 0;
            const levels = parseInt(document.getElementById('nest-levels').value);
            const chainLen = parseInt(document.getElementById('nest-chain').value);
            let pts = 0;
            for (let c = 0; c < chainLen; c++) {
                const linkGroup = new THREE.Group();
                pts += generateRecursive(1, levels, new THREE.Vector3(0,0,c*372.47), 1, linkGroup);
                if (c % 2 !== 0) linkGroup.rotation.x = Math.PI;
                currentGroup.add(linkGroup);
            }
            totalPointsOnScreen = pts;
            finalize(pts);
        }

        function generateRecursive(lvl, max, pos, scale, group) {
            const p = createPoints(baseDataArray, scale, lvl-1);
            p.position.copy(pos); p.scale.set(scale, scale, scale);
            group.add(p);
            let cPts = (baseDataArray.length/3);
            if (lvl < max) {
                const nextS = scale * 0.5;
                cPts += generateRecursive(lvl+1, max, new THREE.Vector3(pos.x - 75*scale, pos.y, pos.z - 93.12*scale), nextS, group);
                cPts += generateRecursive(lvl+1, max, new THREE.Vector3(pos.x + 75*scale, pos.y, pos.z + 93.12*scale), nextS, group);
            }
            return cPts;
        }

        function resetScene() { scene.remove(currentGroup); currentGroup = new THREE.Group(); scene.add(currentGroup); }
        function finalize(pts) { 
            document.getElementById('count').innerText = Math.round(pts).toLocaleString(); 
            setTimeout(centerView, 100);
        }
        function animate(time) {
            requestAnimationFrame(animate);
            frameCount++;
            if (time >= lastTime + 1000) {
                document.getElementById('fps').innerText = frameCount;
                frameCount = 0; lastTime = time;
            }
            controls.update(); renderer.render(scene, camera);
        }
        function centerView() {
            const box = new THREE.Box3().setFromObject(currentGroup);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            camera.position.set(center.x, center.y, center.z + Math.max(size.x, size.y, size.z)*1.8);
            controls.target.copy(center);
        }
        function toggleUI() { const ui = document.getElementById('gideon-ui'); ui.style.display = ui.style.display==='none'?'block':'none'; }
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        loadProtectedCore().then(() => { build3DCore(); animate(0); });
    </script>
</body>
</html>
