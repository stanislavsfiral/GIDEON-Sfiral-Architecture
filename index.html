<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GIDEON Engine v9.2.1 - Master Topology</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #00ffcc; }
        .controls-container { position: fixed; top: 20px; right: 20px; z-index: 2001; }
        .control-btn { background: #000; color: #ffcc00; border: 1px solid #ffcc00; width: 35px; height: 35px; cursor: pointer; border-radius: 3px; display: flex; align-items: center; justify-content: center; }
        #gideon-ui { position: fixed; top: 70px; right: 20px; background: rgba(0, 10, 10, 0.95); padding: 15px; border: 1px solid #00ffcc; z-index: 1000; width: 300px; max-height: calc(100vh - 120px); overflow-y: auto; border-radius: 4px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.3); }
        h2 { font-size: 13px; margin: 0 0 15px 0; border-bottom: 1px solid #00ffcc; padding-bottom: 8px; text-align: center; }
        .cat-group { margin-bottom: 15px; background: rgba(0,30,30,0.3); padding: 10px; border-radius: 4px; }
        .cat-header { font-size: 10px; color: #ffcc00; margin-bottom: 8px; text-transform: uppercase; border-left: 2px solid #ffcc00; padding-left: 8px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 5px; }
        .m-btn { background: rgba(0, 40, 40, 0.4); border: 1px solid #00ffcc33; color: #aaffff; padding: 6px; font-size: 9px; cursor: pointer; border-radius: 2px; text-align: center; transition: all 0.2s; }
        .m-btn:hover { border-color: #00ffcc; background: rgba(0, 60, 60, 0.6); color: #fff; }
        #stats { font-size: 11px; margin-top: 15px; border-top: 1px solid #00ffcc33; padding-top: 10px; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .stat-label { color: #55aaaa; text-transform: uppercase; font-size: 9px; }
        .stat-value { color: #00ffcc; font-weight: bold; }
        #loader { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; justify-content:center; align-items:center; z-index:2000; color:#00ffcc; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="loader">ГЛУБИННЫЙ СИНТЕЗ GIDEON...</div>
    <div class="controls-container"><button class="control-btn" onclick="toggleUI()">≡</button></div>

    <div id="gideon-ui">
        <h2>GIDEON CORE v9.2.1</h2>
        
        <div class="cat-group">
            <div class="cat-header">🧱 БАЗОВЫЕ УЗЛЫ</div>
            <div class="btn-grid">
                <button class="m-btn" onclick="buildBase(1)">BASE x1</button>
                <button class="m-btn" onclick="buildBase(2)">DIPOLE x2</button>
            </div>
        </div>

        <div class="cat-group">
            <div class="cat-header">🧬 ФРАКТАЛЬНЫЕ КОЛЬЦА (MASTER)</div>
            <div class="btn-grid">
                <button class="m-btn" style="border-color:#ffcc00; color:#ffcc00;" onclick="buildDeepRing('ring3', 3)">MASTER RING x3</button>
                <button class="m-btn" style="border-color:#ffcc00; color:#ffcc00;" onclick="buildDeepRing('ring4', 4)">MASTER RING x4</button>
            </div>
            <div style="font-size:8px; color:#55aaaa; margin-top:8px; text-align:center; line-height:1.2;">СКАНИРОВАНИЕ ИЕРАРХИИ ПАПОК:<br>ROOT / [ID] / part1.npy + SUB</div>
        </div>

        <div id="stats">
            <div class="stat-row"><span class="stat-label">FPS</span><span id="fps-counter" class="stat-value">0</span></div>
            <div class="stat-row"><span class="stat-label">ВЕРШИН</span><span id="count" class="stat-value">0</span></div>
        </div>
        <button class="m-btn" style="width:100%; margin-top:10px; border-color:#00ffcc; color:#00ffcc;" onclick="centerView()">CENTER VIEW</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 5000000);
        camera.position.set(2000, 2000, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        let currentGroup = new THREE.Group();
        scene.add(currentGroup);

        const RINGS_PATH = 'models/static/rings/';
        let baseDataArray = null;
        let framesThisSecond = 0, lastFpsUpdate = performance.now();

        async function loadProtectedCore() {
            const parts = ['p1.npy', 'p2.npy', 'p3.npy', 'p4.npy'];
            let combined = [];
            document.getElementById('loader').style.display = 'flex';
            try {
                for (let p of parts) {
                    const res = await fetch(`models/core_v8/${p}`);
                    const buffer = await res.arrayBuffer();
                    combined.push(...new Float32Array(buffer.slice(128)));
                }
                baseDataArray = new Float32Array(combined);
            } catch (e) { console.error("Core Load Error:", e); }
            document.getElementById('loader').style.display = 'none';
        }

        async function fetchPoints(path) {
            try {
                const res = await fetch(path);
                if (!res.ok) return null;
                const buffer = await res.arrayBuffer();
                return new Float32Array(buffer.slice(128));
            } catch (e) { return null; }
        }

        function createPoints(data, color, scale = 1) {
            const geo = new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(data, 3));
            return new THREE.Points(geo, new THREE.PointsMaterial({ color, size: 2 * scale, transparent: true, opacity: 0.85 }));
        }

        async function buildBase(count) {
            if (!baseDataArray) await loadProtectedCore();
            reset();
            for (let i = 0; i < count; i++) {
                const p = createPoints(baseDataArray, 0x00ffcc);
                if (i === 1) p.rotation.set(Math.PI, 0, Math.PI);
                currentGroup.add(p);
            }
            finalize((baseDataArray.length/3)*count);
        }

        // --- MASTER SCANNER: ПОИСК part1.npy ВО ВСЕХ ПОДПАПКАХ ---
        async function buildDeepRing(folder, count) {
            reset();
            document.getElementById('loader').style.display = 'flex';
            let totalPts = 0;

            for (let i = 1; i <= count; i++) {
                // Универсальный поиск: везде ищем part1.npy
                const paths = [
                    `${RINGS_PATH}${folder}/${i}/part1.npy`,      // Главная в папке 1, 2 или 3
                    `${RINGS_PATH}${folder}/${i}/sub1/part1.npy`, // Дочка 1
                    `${RINGS_PATH}${folder}/${i}/sub2/part1.npy`  // Дочка 2
                ];

                for (let j = 0; j < paths.length; j++) {
                    const data = await fetchPoints(paths[j]);
                    if (data) {
                        // Цвет: основная - изумрудная, дочки - лазурные
                        const color = (j === 0) ? 0x00ffcc : 0x00aaff;
                        const scale = (j === 0) ? 1.0 : 0.5;
                        currentGroup.add(createPoints(data, color, scale));
                        totalPts += data.length / 3;
                    }
                }
            }

            document.getElementById('loader').style.display = 'none';
            finalize(totalPts);
        }

        function reset() { scene.remove(currentGroup); currentGroup = new THREE.Group(); scene.add(currentGroup); }
        function finalize(pts) { 
            document.getElementById('count').innerText = Math.round(pts).toLocaleString(); 
            setTimeout(centerView, 150); 
        }

        function animate() {
            requestAnimationFrame(animate);
            framesThisSecond++;
            const now = performance.now();
            if (now - lastFpsUpdate >= 1000) {
                document.getElementById('fps-counter').innerText = Math.round(framesThisSecond * 1000 / (now - lastFpsUpdate));
                framesThisSecond = 0; lastFpsUpdate = now;
            }
            controls.update(); renderer.render(scene, camera);
        }

        function centerView() {
            const box = new THREE.Box3().setFromObject(currentGroup);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            controls.target.copy(center);
            camera.position.set(center.x, center.y, center.z + Math.max(size.x, size.y, size.z)*1.4);
            controls.update();
        }

        function toggleUI() { const ui = document.getElementById('gideon-ui'); ui.style.display = ui.style.display==='none'?'block':'none'; }

        loadProtectedCore().then(() => { buildBase(1); animate(); });
    </script>
</body>
</html>
