<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIDEON v13.5 - Sfiral SF System</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: #00ffcc; }
        .controls-container { position: fixed; top: 15px; right: 15px; z-index: 2001; }
        .control-btn { background: #000; color: #ffcc00; border: 1px solid #ffcc00; width: 40px; height: 40px; cursor: pointer; border-radius: 5px; font-size: 20px; }
        
        #gideon-ui { 
            position: fixed; top: 65px; right: 15px; 
            background: rgba(0, 15, 15, 0.98); 
            padding: 15px; border: 2px solid #00ffcc; 
            z-index: 1000; width: 280px; 
            max-height: 85vh; overflow-y: auto; 
            border-radius: 8px; box-shadow: 0 0 30px rgba(0, 255, 204, 0.4);
            scrollbar-width: thin; scrollbar-color: #00ffcc #000;
        }

        #global-tooltip {
            position: fixed; display: none; background: #ffcc00; color: #000;
            padding: 8px 12px; border-radius: 4px; font-size: 11px; font-weight: bold;
            z-index: 9999; pointer-events: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            max-width: 220px; text-align: center; line-height: 1.2;
        }

        .guide-box { background: rgba(255, 204, 0, 0.1); border: 1px dashed #ffcc00; padding: 10px; margin-bottom: 15px; font-size: 11px; color: #fff; }
        h2 { font-size: 14px; margin: 0 0 10px 0; text-align: center; color: #fff; border-bottom: 1px solid #00ffcc; padding-bottom: 5px; }
        .cat-group { margin-bottom: 10px; padding: 10px; border: 1px solid #00ffcc33; border-radius: 4px; background: rgba(0,30,30,0.3); }
        .cat-header { font-size: 9px; color: #ffcc00; margin-bottom: 8px; text-transform: uppercase; border-left: 3px solid #ffcc00; padding-left: 8px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        input, select { background: #000; border: 1px solid #00ffcc; color: #ffcc00; padding: 6px; font-size: 11px; width: 100%; box-sizing: border-box; }
        .m-btn { background: rgba(0, 40, 40, 0.7); border: 1px solid #00ffcc66; color: #fff; padding: 10px; font-size: 10px; cursor: pointer; border-radius: 3px; width: 100%; }
        .m-btn:hover { background: #00ffcc; color: #000; }
        .m-btn.action { background: #008888; border: 1px solid #00ffcc; font-weight: bold; }
        #stats-box { position: fixed; bottom: 15px; left: 15px; font-size: 10px; color: #ffcc00; pointer-events: none; }
    </style>
</head>
<body>

    <div id="global-tooltip"></div>
    <div id="loader" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; color:#00ffcc; display:flex; justify-content:center; align-items:center; z-index:3000;">GIDEON v13.5: ОПТИМИЗАЦИЯ...</div>
    <div id="stats-box">FPS: <span id="fps">0</span> | PTS: <span id="count">0</span></div>

    <div class="controls-container">
        <button class="control-btn" onclick="toggleUI()" data-tip="Скрыть/показать это меню (≡)">≡</button>
    </div>

    <div id="gideon-ui">
        <h2>КОНСТРУКТОР GIDEON</h2>
        
        <div class="cat-group">
            <div class="cat-header">⚙️ РЕЗОНАНС (ШАГ Z)</div>
            <input type="number" id="chain-step" value="372.72" step="0.01" data-tip="Точный шаг стыковки. 372.72 — эталон.">
        </div>
        
        <div class="cat-group">
            <div class="cat-header">⚛️ ГЕНЕРАТОР ЯДРА</div>
            <select id="axis-select" data-tip="Ось: направление вращения узора">
                <option value="y">ОСЬ Y (ГОРИЗОНТАЛЬ)</option>
                <option value="x">ОСЬ X (ВЕРТИКАЛЬ)</option>
                <option value="z">ОСЬ Z (ГЛУБИНА)</option>
            </select>
            <input type="number" id="core-count" value="12" style="margin-top:5px;" data-tip="Сколько диполей будет в круге">
            <div class="btn-grid" style="margin-top:5px;">
                <button class="m-btn action" onclick="build3DCore(false)" data-tip="Удалить всё и создать новое ядро">НОВОЕ ЯДРО</button>
                <button class="m-btn action" style="background:#440066;" onclick="build3DCore(true)" data-tip="Добавить новый слой поверх текущего">+ СЛОЙ</button>
            </div>
        </div>

        <div class="cat-group">
            <div class="cat-header">💍 КОЛЬЦА</div>
            <input type="number" id="manual-l-depth" value="3" data-tip="L-Depth: уровни вложенности в кольцах">
            <div class="btn-grid" style="margin-top:5px;">
                <button class="m-btn" onclick="buildManualRing('ring3', 3)" data-tip="Треугольник из 3-х сфиралей">RING x3</button>
                <button class="m-btn" onclick="buildManualRing('ring4', 4)" data-tip="Квадрат из 4-х сфиралей">RING x4</button>
            </div>
        </div>

        <div class="cat-group">
            <div class="cat-header">🧱 БАЗОВЫЕ ЦЕПИ</div>
            <div class="btn-grid">
                <button class="m-btn" onclick="buildBase(1)" data-tip="Одиночный виток">BASE x1</button>
                <button class="m-btn" onclick="buildBase(2)" data-tip="Двойной виток (Диполь)">DIPOLE x2</button>
            </div>
            <div style="margin-top:5px;">
                <input type="number" id="simple-chain" value="4" data-tip="N: количество звеньев в линии">
                <button class="m-btn" style="margin-top:3px;" onclick="runSimpleChain()" data-tip="Линейная цепь с выбранным шагом Z">BUILD CHAIN</button>
            </div>
        </div>

        <div class="cat-group">
            <div class="cat-header">🌀 МАТРИЦА (МАТРЕШКА)</div>
            <div style="display:flex; gap:5px; margin-bottom:5px;">
                <input type="number" id="nest-levels" value="3" data-tip="L: глубина вложенности">
                <input type="number" id="nest-chain" value="4" data-tip="CH: длина фрактальной ветки">
            </div>
            <button class="m-btn action" onclick="buildFractalChain()" data-tip="Сложная фрактальная структура">BUILD MATRIX</button>
        </div>

        <button class="m-btn" style="width:100%; border-color:#ff4444; color:#ff4444; margin-bottom:5px;" onclick="resetAll()" data-tip="Полная очистка экрана">CLEAR</button>
        <button class="m-btn" style="width:100%; border-color:#ffcc00; color:#ffcc00;" onclick="centerView()" data-tip="Вернуть камеру в центр">CENTER VIEW</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // --- СИСТЕМА УМНЫХ ПОДСКАЗОК ---
        const tooltip = document.getElementById('global-tooltip');
        document.addEventListener('mouseover', (e) => {
            const tip = e.target.getAttribute('data-tip');
            if (tip) { tooltip.textContent = tip; tooltip.style.display = 'block'; }
        });
        document.addEventListener('mousemove', (e) => {
            if (tooltip.style.display === 'block') {
                if (e.target.tagName === 'INPUT') { tooltip.style.display = 'none'; return; }
                let x = e.clientX - 210; let y = e.clientY + 20;
                if (x < 10) x = e.clientX + 20; 
                tooltip.style.left = x + 'px'; tooltip.style.top = y + 'px';
            }
        });
        document.addEventListener('mouseout', (e) => {
            if (e.target.getAttribute('data-tip')) tooltip.style.display = 'none';
        });

        // --- ЛОГИКА ТРЕХМЕРНОЙ СЦЕНЫ ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 10000000);
        camera.position.set(3000, 3000, 3000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        let currentGroup = new THREE.Group();
        scene.add(currentGroup);
        let baseDataArray = null;
        let lastTime = 0, frameCount = 0, totalPtsOnScreen = 0;
        const DEPTH_COLORS = [0xffffff, 0xffff00, 0x00ff00, 0xff00ff];

        async function loadProtectedCore() {
            const parts = ['p1.npy', 'p2.npy', 'p3.npy', 'p4.npy'];
            let combined = [];
            try {
                for (let p of parts) {
                    const res = await fetch(`models/core_v8/${p}`);
                    const buffer = await res.arrayBuffer();
                    combined.push(...new Float32Array(buffer.slice(128)));
                }
                baseDataArray = new Float32Array(combined);
                document.getElementById('loader').style.display = 'none';
            } catch (e) { 
                console.error(e); 
                document.getElementById('loader').innerText = "ОШИБКА ЗАГРУЗКИ";
            }
        }

        async function fetchPoints(path) {
            try {
                const res = await fetch(path);
                if (!res.ok) return null;
                const buffer = await res.arrayBuffer();
                return new Float32Array(buffer.slice(128));
            } catch (e) { return null; }
        }

        function createPoints(data, scale = 1, colorIdx = 0) {
            const geo = new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(data, 3));
            return new THREE.Points(geo, new THREE.PointsMaterial({ 
                color: DEPTH_COLORS[colorIdx % 4], size: 5.5 * scale, 
                transparent: true, opacity: 1.0, blending: THREE.AdditiveBlending, depthWrite: false 
            }));
        }

        async function build3DCore(addLayer = false) {
            if (!baseDataArray) await loadProtectedCore();
            if (!addLayer) resetAll();
            const count = parseInt(document.getElementById('core-count').value);
            const axis = document.getElementById('axis-select').value;
            const angleStep = (Math.PI * 2) / count;
            for (let i = 0; i < count; i++) {
                const petal = new THREE.Group();
                const p1 = createPoints(baseDataArray, 1, addLayer ? 1 : 0);
                const p2 = createPoints(baseDataArray, 1, addLayer ? 1 : 0);
                p2.rotation.set(Math.PI, 0, Math.PI);
                petal.add(p1); petal.add(p2);
                if (axis === 'x') petal.rotation.x = i * angleStep;
                else if (axis === 'y') petal.rotation.y = i * angleStep;
                else if (axis === 'z') petal.rotation.z = i * angleStep;
                currentGroup.add(petal);
            }
            totalPtsOnScreen += (baseDataArray.length/3)*2*count; finalize(totalPtsOnScreen);
        }

        async function buildManualRing(folder, count) {
            resetAll();
            const L = parseInt(document.getElementById('manual-l-depth').value);
            let pts = 0;
            for (let i = 1; i <= count; i++) {
                const m = await fetchPoints(`models/static/rings/${folder}/${i}/part1.npy`);
                if (m) { currentGroup.add(createPoints(m, 1.2, 0)); pts += m.length/3; }
                if (L >= 2) {
                    const s1 = await fetchPoints(`models/static/rings/${folder}/${i}/sub1/part1.npy`);
                    if (s1) { currentGroup.add(createPoints(s1, 0.8, 1)); pts += s1.length/3; }
                }
                if (L >= 3) {
                    const s2 = await fetchPoints(`models/static/rings/${folder}/${i}/sub2/part1.npy`);
                    if (s2) { currentGroup.add(createPoints(s2, 0.6, 2)); pts += s2.length/3; }
                }
            }
            totalPtsOnScreen = pts; finalize(totalPtsOnScreen);
        }

        async function buildBase(count) {
            if (!baseDataArray) await loadProtectedCore();
            resetAll();
            for (let i = 0; i < count; i++) {
                const p = createPoints(baseDataArray, 1, 0);
                if (i === 1) p.rotation.set(Math.PI, 0, Math.PI);
                currentGroup.add(p);
            }
            totalPtsOnScreen = (baseDataArray.length/3)*count; finalize(totalPtsOnScreen);
        }

        async function runSimpleChain() {
            if (!baseDataArray) await loadProtectedCore();
            resetAll();
            const count = parseInt(document.getElementById('simple-chain').value);
            const step = parseFloat(document.getElementById('chain-step').value);
            for (let i = 0; i < count; i++) {
                const pGroup = new THREE.Group();
                const p1 = createPoints(baseDataArray, 1, 0);
                const p2 = createPoints(baseDataArray, 1, 0);
                p2.rotation.set(Math.PI, 0, Math.PI);
                pGroup.add(p1); pGroup.add(p2);
                pGroup.position.z = i * step;
                if (i % 2 !== 0) pGroup.rotation.x = Math.PI;
                currentGroup.add(pGroup);
            }
            totalPtsOnScreen = (baseDataArray.length/3)*2*count; finalize(totalPtsOnScreen);
        }

        async function buildFractalChain() {
            if (!baseDataArray) await loadProtectedCore();
            resetAll();
            const levels = parseInt(document.getElementById('nest-levels').value);
            const chainLen = parseInt(document.getElementById('nest-chain').value);
            const step = parseFloat(document.getElementById('chain-step').value);
            let pts = 0;
            for (let c = 0; c < chainLen; c++) {
                const linkGroup = new THREE.Group();
                pts += generateRecursive(1, levels, new THREE.Vector3(0,0,0), 1, linkGroup, step);
                linkGroup.position.z = c * step;
                if (c % 2 !== 0) linkGroup.rotation.x = Math.PI;
                currentGroup.add(linkGroup);
            }
            totalPtsOnScreen = pts; finalize(totalPtsOnScreen);
        }

        function generateRecursive(lvl, max, pos, scale, group, step) {
            const p = createPoints(baseDataArray, scale, lvl-1);
            p.position.copy(pos); p.scale.set(scale, scale, scale);
            group.add(p);
            let pts = (baseDataArray.length/3);
            if (lvl < max) {
                const s = scale * 0.5;
                const shiftX = 75 * scale;
                const shiftZ = (step / 4) * scale; 
                pts += generateRecursive(lvl+1, max, new THREE.Vector3(pos.x - shiftX, pos.y, pos.z - shiftZ), s, group, step);
                pts += generateRecursive(lvl+1, max, new THREE.Vector3(pos.x + shiftX, pos.y, pos.z + shiftZ), s, group, step);
            }
            return pts;
        }

        function resetAll() { scene.remove(currentGroup); currentGroup = new THREE.Group(); scene.add(currentGroup); totalPtsOnScreen = 0; }
        function finalize(pts) { 
            document.getElementById('count').innerText = Math.round(pts).toLocaleString(); 
            setTimeout(centerView, 100);
        }
        function animate(time) {
            requestAnimationFrame(animate); frameCount++;
            if (time >= lastTime + 1000) { document.getElementById('fps').innerText = frameCount; frameCount = 0; lastTime = time; }
            controls.update(); renderer.render(scene, camera);
        }
        function centerView() {
            const box = new THREE.Box3().setFromObject(currentGroup);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            camera.position.set(center.x, center.y, center.z + Math.max(size.x, size.y, size.z)*1.8);
            controls.target.copy(center);
        }
        function toggleUI() { const ui = document.getElementById('gideon-ui'); ui.style.display = ui.style.display==='none'?'block':'none'; }
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        loadProtectedCore().then(() => { build3DCore(false); animate(0); });
    </script>
</body>
</html>
