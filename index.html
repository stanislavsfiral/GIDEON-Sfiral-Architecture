<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GIDEON Engine v10.1 - Ultra Bright</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #00ffcc; }
        .controls-container { position: fixed; top: 20px; right: 20px; z-index: 2001; }
        .control-btn { background: #000; color: #ffcc00; border: 1px solid #ffcc00; width: 35px; height: 35px; cursor: pointer; border-radius: 3px; display: flex; align-items: center; justify-content: center; }
        #gideon-ui { position: fixed; top: 70px; right: 20px; background: rgba(0, 5, 5, 0.9); padding: 15px; border: 1px solid #00ffcc; z-index: 1000; width: 300px; max-height: calc(100vh - 120px); overflow-y: auto; border-radius: 4px; box-shadow: 0 0 15px rgba(0, 255, 204, 0.2); }
        h2 { font-size: 13px; margin: 0 0 15px 0; border-bottom: 1px solid #00ffcc; padding-bottom: 8px; text-align: center; }
        .cat-group { margin-bottom: 15px; background: rgba(0,20,20,0.4); padding: 10px; border-radius: 4px; }
        .cat-header { font-size: 10px; color: #ffcc00; margin-bottom: 8px; text-transform: uppercase; border-left: 2px solid #ffcc00; padding-left: 8px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 5px; }
        input { background: #000; border: 1px solid #00ffcc33; color: #ffcc00; width: 45px; padding: 4px; font-size: 10px; }
        .m-btn { background: rgba(0, 40, 40, 0.4); border: 1px solid #00ffcc33; color: #aaffff; padding: 6px; font-size: 9px; cursor: pointer; border-radius: 2px; text-align: center; }
        .m-btn.action { background: rgba(0, 100, 100, 0.6); border: 1px solid #00ffcc; color: #fff; font-weight: bold; padding: 10px; margin-top: 5px; width: 100%; font-size: 10px; box-shadow: 0 0 10px rgba(0, 255, 204, 0.4); }
        #stats { font-size: 11px; margin-top: 15px; border-top: 1px solid #00ffcc33; padding-top: 10px; }
        #loader { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:2000; color:#00ffcc; }
    </style>
</head>
<body>

    <div id="loader">GIDEON: ФОРСИРОВАНИЕ ЯРКОСТИ v10.1...</div>
    <div class="controls-container"><button class="control-btn" onclick="toggleUI()">≡</button></div>

    <div id="gideon-ui">
        <h2>GIDEON CORE v10.1</h2>
        
        <div class="cat-group">
            <div class="cat-header">🧱 БАЗА / ЦЕПЬ</div>
            <div class="btn-grid">
                <button class="m-btn" onclick="buildBase(1)">BASE x1</button>
                <button class="m-btn" onclick="runSimpleChain()">CHAIN</button>
            </div>
        </div>

        <div class="cat-group">
            <div class="cat-header">💍 КОЛЬЦА (L-DEPTH)</div>
            <div style="font-size:9px; margin-bottom:5px; display:flex; justify-content:space-between; align-items:center;">
                УРОВЕНЬ L: <input type="number" id="manual-l-depth" value="2">
            </div>
            <div class="btn-grid">
                <button class="m-btn" onclick="buildManualRing('ring3', 3)">RING x3</button>
                <button class="m-btn" onclick="buildManualRing('ring4', 4)">RING x4</button>
            </div>
        </div>

        <div class="cat-group">
            <div class="cat-header">🌀 МАТРЕШКА (0.5)</div>
            <div style="font-size:9px; margin-bottom:5px;">L: <input type="number" id="nest-levels" value="2"> CH: <input type="number" id="nest-chain" value="4"></div>
            <button class="m-btn action" onclick="buildFractalChain()">ПОСТРОИТЬ МАТРИЦУ</button>
        </div>

        <div id="stats">
            <div class="stat-row" style="display:flex; justify-content:space-between;"><span style="color:#55aaaa; font-size:9px;">ВЕРШИН:</span><span id="count" style="color:#00ffcc; font-weight:bold;">0</span></div>
        </div>
        <button class="m-btn" style="width:100%; margin-top:10px; border-color:#ffcc00; color:#ffcc00;" onclick="centerView()">CENTER VIEW</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 10000000);
        camera.position.set(2000, 2000, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 1);
        document.body.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        let currentGroup = new THREE.Group();
        scene.add(currentGroup);

        const RINGS_PATH = 'models/static/rings/';
        const STEP_Z = 372.47; 
        const OFFSET_X = 75; const OFFSET_Z = 93.12;
        let baseDataArray = null;

        async function loadProtectedCore() {
            const parts = ['p1.npy', 'p2.npy', 'p3.npy', 'p4.npy'];
            let combined = [];
            document.getElementById('loader').style.display = 'flex';
            try {
                for (let p of parts) {
                    const res = await fetch(`models/core_v8/${p}`);
                    const buffer = await res.arrayBuffer();
                    combined.push(...new Float32Array(buffer.slice(128)));
                }
                baseDataArray = new Float32Array(combined);
            } catch (e) { console.error(e); }
            document.getElementById('loader').style.display = 'none';
        }

        async function fetchPoints(path) {
            try {
                const res = await fetch(path);
                if (!res.ok) return null;
                const buffer = await res.arrayBuffer();
                return new Float32Array(buffer.slice(128));
            } catch (e) { return null; }
        }

        // --- ГИПЕР-ЯРКИЙ МАТЕРИАЛ ---
        function createPoints(data, color, scale = 1) {
            const geo = new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(data, 3));
            return new THREE.Points(geo, new THREE.PointsMaterial({ 
                color: 0x00ffff,               // Смещение в сторону яркого циана
                size: 4.5 * scale,             // Максимально жирные точки
                transparent: true, 
                opacity: 1.0, 
                sizeAttenuation: true, 
                blending: THREE.AdditiveBlending, // Ключевой эффект суммирования яркости
                depthWrite: false              // Убирает наложение черных пикселей
            }));
        }

        async function buildBase(count) {
            if (!baseDataArray) await loadProtectedCore();
            reset();
            currentGroup.add(createPoints(baseDataArray, 0x00ffcc));
            finalize(baseDataArray.length/3);
        }

        async function runSimpleChain() {
            if (!baseDataArray) await loadProtectedCore();
            reset();
            const count = 4;
            for (let i = 0; i < count; i++) {
                const p = createPoints(baseDataArray, 0x00ffcc);
                p.position.z = i * STEP_Z;
                if (i % 2 !== 0) p.rotation.x = Math.PI;
                currentGroup.add(p);
            }
            finalize((baseDataArray.length/3)*count);
        }

        async function buildManualRing(folder, count) {
            reset();
            const L = parseInt(document.getElementById('manual-l-depth').value);
            let pts = 0;
            for (let i = 1; i <= count; i++) {
                const main = await fetchPoints(`${RINGS_PATH}${folder}/${i}/part1.npy`);
                if (main) { currentGroup.add(createPoints(main, 0x00ffcc, 1.2)); pts += main.length/3; }
                if (L >= 2) {
                    const s1 = await fetchPoints(`${RINGS_PATH}${folder}/${i}/sub1/part1.npy`);
                    const s2 = await fetchPoints(`${RINGS_PATH}${folder}/${i}/sub2/part1.npy`);
                    if (s1) { currentGroup.add(createPoints(s1, 0x00ffff, 0.8)); pts += s1.length/3; }
                    if (s2) { currentGroup.add(createPoints(s2, 0x00ffff, 0.8)); pts += s2.length/3; }
                }
            }
            finalize(pts);
        }

        async function buildFractalChain() {
            if (!baseDataArray) await loadProtectedCore();
            reset();
            const levels = parseInt(document.getElementById('nest-levels').value);
            const chainLen = parseInt(document.getElementById('nest-chain').value);
            for (let c = 0; c < chainLen; c++) {
                const linkGroup = new THREE.Group();
                generateRecursive(1, levels, new THREE.Vector3(0,0,0), 1, linkGroup);
                linkGroup.position.z = c * STEP_Z;
                if (c % 2 !== 0) linkGroup.rotation.x = Math.PI;
                currentGroup.add(linkGroup);
            }
            finalize(0);
        }

        function generateRecursive(lvl, max, pos, scale, group) {
            const p = createPoints(baseDataArray, 0x00ffcc, scale);
            p.position.copy(pos); p.scale.set(scale, scale, scale);
            group.add(p);
            if (lvl < max) {
                const nextS = scale * 0.5; 
                const oX = OFFSET_X * scale, oZ = OFFSET_Z * scale;
                generateRecursive(lvl+1, max, new THREE.Vector3(pos.x - oX, pos.y, pos.z - oZ), nextS, group);
                generateRecursive(lvl+1, max, new THREE.Vector3(pos.x + oX, pos.y, pos.z + oZ), nextS, group);
            }
        }

        function reset() { scene.remove(currentGroup); currentGroup = new THREE.Group(); scene.add(currentGroup); }
        function finalize(pts) { 
            if(pts > 0) document.getElementById('count').innerText = Math.round(pts).toLocaleString(); 
            setTimeout(centerView, 150); 
        }

        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        function centerView() {
            const box = new THREE.Box3().setFromObject(currentGroup);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            camera.position.set(center.x, center.y, center.z + Math.max(size.x, size.y, size.z)*1.5);
            controls.target.copy(center); controls.update();
        }
        function toggleUI() { const ui = document.getElementById('gideon-ui'); ui.style.display = ui.style.display==='none'?'block':'none'; }

        loadProtectedCore().then(() => { runSimpleChain(); animate(); });
    </script>
</body>
</html>
